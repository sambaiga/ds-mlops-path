name: Check QMD Files

on:
  push:
    paths:
      - "tutorials/**/*.qmd"
      - "tutorials/_quarto/**"
      - "_quarto.yml"
      - ".github/workflows/check-qmd.yml"
  pull_request:
    paths:
      - "tutorials/**/*.qmd"
      - "tutorials/_quarto/**"
      - "_quarto.yml"
      - ".github/workflows/check-qmd.yml"
  workflow_dispatch:

jobs:
  lint-qmd:
    name: Lint QMD files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for em-dashes in QMD files
        run: |
          if grep -rPn "—" tutorials/**/*.qmd 2>/dev/null; then
            echo "Em-dashes found in QMD files. Use a colon or comma instead."
            exit 1
          fi
          echo "No em-dashes found."

      - name: Check for invalid code block syntax
        run: |
          if grep -rPn "\{[a-z]+ eval=false\}" tutorials/**/*.qmd 2>/dev/null; then
            echo "Found {lang eval=false} code block syntax. Use plain \`\`\`language fences for display-only blocks."
            exit 1
          fi
          echo "Code block syntax is clean."

      - name: Check for inline callout styles (should use CSS classes in QMD)
        run: |
          if grep -rPn 'style="background:#EAF3FA' tutorials/**/*.qmd 2>/dev/null; then
            echo "Found inline callout styles in QMD files. Use .ark-concept, .ark-activity etc. CSS classes instead."
            exit 1
          fi
          echo "No inline callout styles found in QMD files."

  render-qmd:
    name: Render QMD files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "latest"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Render Part 3 QMD files
        run: |
          for f in tutorials/02-dev-tools/*.qmd; do
            echo "Rendering $f..."
            quarto render "$f" --to html --no-execute 2>&1 | tail -3
          done
        env:
          PYTHONWARNINGS: ignore
