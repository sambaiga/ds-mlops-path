name: Check Notebooks

on:
  push:
    paths:
      - "tutorials/**/*.ipynb"
      - "tutorials/**/data/**"
      - "ark/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/check-notebooks.yml"
  pull_request:
    paths:
      - "tutorials/**/*.ipynb"
      - "tutorials/**/data/**"
      - "ark/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/check-notebooks.yml"
  workflow_dispatch:

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev --extra test

      - name: Install nbmake
        run: uv add --dev nbmake

      - name: Execute all notebooks
        run: |
          uv run pytest --nbmake \
            --nbmake-timeout=300 \
            --no-header \
            -v \
            tutorials/01-python-basics/
        env:
          PYTHONWARNINGS: ignore
