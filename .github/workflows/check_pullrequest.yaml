name: ARK CID

on:
  push:
    branches:
      - main
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - "*"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies for uv-lock hook
        run: uv sync
      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-
      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Cache uv dependencies

        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-
      - name: Install dependencies
        run: uv sync --extra modelling  --extra dev --extra test
      - name: Run Ruff Linting and Formatting Check
        run: |
          # Check fails if any linting issues are found or if formatting is required
          uv run ruff check . --exit-non-zero-on-fix
          uv run ruff format . --check
      - name: Run Tests with Coverage
        # No tests/ directory yet - tolerate pytest's "no tests collected" exit
        # code (5) so this step doesn't block CI before tests are written.
        run: |
          set +e
          uv run pytest --cov=ark --cov-report=xml --cov-fail-under=0
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 5 ]; then exit "$code"; fi
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          name: ${{ github.job }}-${{ runner.os }}

  quarto-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Render book
        run: uv run quarto render
