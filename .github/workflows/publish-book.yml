name: Publish Book

on:
  push:
    branches:
      - main
    paths:
      - "tutorials/**"
      - "ark/plot/**"
      - "_quarto.yml"
      - "index.qmd"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/publish-book.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Register ark kernel
        run: uv run python -m ipykernel install --user --name ark --display-name "ark"

      - name: Render book
        run: uv run quarto render

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
