project:
  type: book
  output-dir: _book

book:
  title: "From Data to Impact"
  subtitle: "A Structured Path from Python Fundamentals to Production-Ready Data Science"
  author: "Anthony Faustine"
  date: today
  site-url: "https://sambaiga.github.io/ds-mlops-path/"
  repo-url: "https://github.com/sambaiga/ds-mlops-path"
  repo-branch: main
  repo-actions: [edit, issue, source]
  search: true
  page-navigation: true
  bread-crumbs: false

  sidebar:
    collapse-level: 1

  navbar:
    right:
      - icon: envelope-at
        href: "mailto:sambaiga@gmail.com"
        aria-label: "Email Anthony Faustine"
      - icon: linkedin
        href: "https://www.linkedin.com/in/sambaiga"
        aria-label: "LinkedIn"
      - icon: github
        href: https://github.com/sambaiga/ds-mlops-path
        aria-label: "View source on GitHub"

  page-footer:
    left: |
      <span class="faux-block">&copy; 2025&ndash;2026 <a href="https://sambaiga.github.io/">Anthony Faustine</a></span>
      <span class="faux-block">Code licensed under <a href="https://www.apache.org/licenses/LICENSE-2.0">Apache 2.0</a></span>
    center: |
      <div class="footer-social">
        <a href="mailto:sambaiga@gmail.com" title="Email"><i class="bi bi-envelope-at-fill"></i></a>
        <a href="https://github.com/sambaiga" title="GitHub"><i class="bi bi-github"></i></a>
        <a href="https://www.linkedin.com/in/sambaiga" title="LinkedIn"><i class="bi bi-linkedin"></i></a>
      </div>
    right: |
      <span class="faux-block">Made with <a href="https://quarto.org">Quarto</a></span>
      <span class="faux-block"><a href="https://github.com/sambaiga/ds-mlops-path"><i class="bi bi-github"></i> View source</a></span>

  chapters:
    - index.qmd
    - preface.qmd
    - part: "Part 1: Foundations"
      chapters:
        - tutorials/01-python-basics/01-python-core.ipynb
        - tutorials/01-python-basics/02-control-flow.ipynb
        - tutorials/01-python-basics/03-python-patterns.ipynb
        - tutorials/01-python-basics/04-numpy.ipynb
        - tutorials/01-python-basics/05-matplotlib.ipynb
        - tutorials/01-python-basics/06-lets-plot.ipynb
        - tutorials/01-python-basics/07-data-storytelling.ipynb
    - part: "Part 2: Data Analysis"
      chapters:
        - tutorials/01-python-basics/08-pandas-core.ipynb
        - tutorials/01-python-basics/09-pandas-operations.ipynb
        - tutorials/01-python-basics/10-combining-reshaping.ipynb
        - tutorials/01-python-basics/11-time-series.ipynb
        - tutorials/01-python-basics/11-polars.ipynb
        - tutorials/01-python-basics/12-great-tables.ipynb

    - part: "Part 3: Dev Tools"
      chapters:
        - tutorials/02-dev-tools/00-vscode-setup.qmd
        - tutorials/02-dev-tools/01-uv-project-setup.qmd
        - tutorials/02-dev-tools/02-code-quality-ruff.qmd
        - tutorials/02-dev-tools/03-type-annotations.ipynb
        - tutorials/02-dev-tools/04-git-github.qmd
        - tutorials/02-dev-tools/05-pytest-testing.qmd
        - tutorials/02-dev-tools/06-pre-commit-automation.qmd
        - tutorials/02-dev-tools/07-pydantic-validation.ipynb
        - tutorials/02-dev-tools/08-pandera-schema-validation.ipynb

  # Parts 4-9 are added chapter by chapter as each reaches the same standard as Parts 1-3.
    - part: "Part 4: Classical ML"
      chapters: []
    - part: "Part 5: Deep Learning"
      chapters: []
    - part: "Part 6: LLMs"
      chapters: []
    - part: "Part 7: MLOps"
      chapters: []
    - part: "Part 8: Production Monitoring"
      chapters: []
    - part: "Part 9: ML System Design"
      chapters: []
    - part: "Part 10: Value-driven AI"
      chapters: []

icons:
  bootstrap: true

format:
  html:
    theme: [cosmo, tutorials/_quarto/brand.scss]
    highlight-style: github
    code-fold: false
    code-copy: true
    code-link: false
    toc: true
    toc-depth: 3
    toc-title: "In this chapter"
    number-sections: false
    fig-cap-location: bottom
    anchor-sections: true
    smooth-scroll: true

freeze: auto
execute:
  enabled: true
  error: true
  warning: false
  cache: false
