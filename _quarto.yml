project:
  type: book
  output-dir: _book

book:
  title: "DS-MLOps Path"
  subtitle: "A hands-on, project-based path to production-ready data science"
  author: "Anthony Faustine"
  date: today
  site-url: "https://sambaiga.github.io/ds-mlops-path/"
  repo-url: "https://github.com/sambaiga/ds-mlops-path"
  repo-actions: [edit, issue]
  search: true
  page-navigation: true
  navbar:
    right:
      - icon: github
        href: https://github.com/sambaiga/ds-mlops-path

  chapters:
    - index.qmd
    - part: "Part 1 - Python Basics"
      chapters:
        - tutorials/01-python-basics/01-python-core.ipynb
        - tutorials/01-python-basics/02-control-flow.ipynb
        - tutorials/01-python-basics/03-python-patterns.ipynb
        - tutorials/01-python-basics/04-numpy.ipynb
        - tutorials/01-python-basics/05-matplotlib.ipynb

  # 06-lets-plot.ipynb and 07-data-storytelling.ipynb are still being written.
  # Other parts (dev tools, data analysis, ML intro, MLOps) are also still
  # being written - add their chapters here once each part lands.

icons:
  bootstrap: true

format:
  html:
    theme: [cosmo, tutorials/_quarto/brand.scss]
    highlight-style: github
    code-fold: false
    code-copy: true
    code-link: false
    toc: true
    toc-depth: 3
    fig-cap-location: bottom
    anchor-sections: true

freeze: auto
execute:
  enabled: true
  error: true
  warning: false
  cache: false
