<svg width="800" height="310" viewBox="0 0 800 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="card-shadow" x="-6%" y="-8%" width="114%" height="124%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(30,41,59,0.10)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94A3B8"/>
    </marker>
    <marker id="arr-back" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#CBD5E1"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">The End-to-End ML Workflow</text>
  <text x="400" y="40" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Nine stages from problem framing to monitoring, with two key feedback loops</text>
  <line x1="40" y1="47" x2="760" y2="47" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ========================================================
       ROW 1: Problem Framing | Data Collection | EDA | Feature Engineering | Model Selection
       Stage box: w=132, h=52, gap=16
       x positions: 10, 158, 306, 454, 602
       ======================================================== -->

  <!-- Stage 1: Problem Framing (#1E293B dark) -->
  <rect x="10" y="60" width="132" height="52" rx="8" fill="#1E293B" filter="url(#card-shadow)"/>
  <text x="76" y="82" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#FFFFFF">Problem</text>
  <text x="76" y="97" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#FFFFFF">Framing</text>
  <text x="76" y="112" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8">spec card</text>

  <!-- arrow 1 to 2 -->
  <line x1="142" y1="86" x2="154" y2="86" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Stage 2: Data Collection (green) -->
  <rect x="156" y="60" width="132" height="52" rx="8" fill="#EBF5F0" stroke="#059669" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="222" y="82" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#065F46">Data</text>
  <text x="222" y="97" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#065F46">Collection</text>
  <text x="222" y="112" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#059669">gather + clean</text>

  <!-- arrow 2 to 3 -->
  <line x1="288" y1="86" x2="300" y2="86" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Stage 3: EDA (green) -->
  <rect x="302" y="60" width="132" height="52" rx="8" fill="#EBF5F0" stroke="#059669" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="368" y="86" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#065F46">EDA</text>
  <text x="368" y="101" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#059669">explore + understand</text>

  <!-- arrow 3 to 4 -->
  <line x1="434" y1="86" x2="446" y2="86" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Stage 4: Feature Engineering (green) -->
  <rect x="448" y="60" width="132" height="52" rx="8" fill="#EBF5F0" stroke="#059669" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="514" y="82" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#065F46">Feature</text>
  <text x="514" y="97" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#065F46">Engineering</text>
  <text x="514" y="112" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#059669">transform + enrich</text>

  <!-- arrow 4 to 5 -->
  <line x1="580" y1="86" x2="592" y2="86" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Stage 5: Model Selection (blue) -->
  <rect x="594" y="60" width="132" height="52" rx="8" fill="#EAF3FA" stroke="#0369A1" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="660" y="82" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#1E3A5F">Model</text>
  <text x="660" y="97" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#1E3A5F">Selection</text>
  <text x="660" y="112" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#0369A1">choose algorithm</text>

  <!-- Down arrow from Model Selection to Training (row 2) -->
  <line x1="660" y1="112" x2="660" y2="148" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- ========================================================
       ROW 2: Training | Evaluation | Deployment | Monitoring
       x positions: 594, 448, 302, 156 (right to left, but arrows go left to right)
       Wait - the flow goes: Training -> Evaluation -> Deployment -> Monitoring
       So left to right in row 2: Training(594) -> Evaluation(448) -> Deployment(302) -> Monitoring(156)
       Actually let me do row 2 left to right for readability:
       Training: x=10, Evaluation: x=216, Deployment: x=422, Monitoring: x=628
       With the down-arrow connecting from Model Selection (x=660) to Training (x=76)
       ======================================================== -->

  <!-- Actually let me reconsider layout.
       Row 1 left-to-right: Problem Framing, Data Collection, EDA, Feature Engineering, Model Selection
       Down arrow from Model Selection to Training
       Row 2 left-to-right (below row 1): Training, Evaluation, Deployment, Monitoring
       This makes a natural L-shape flow
  -->

  <!-- Stage 6: Training (blue) - below Model Selection, then flow goes LEFT -->
  <!-- Let me put Training at x=594 (same column as Model Selection), flow left -->
  <rect x="594" y="156" width="132" height="52" rx="8" fill="#EAF3FA" stroke="#0369A1" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="660" y="178" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#1E3A5F">Training</text>
  <text x="660" y="197" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#0369A1">learn from data</text>

  <!-- arrow Training to Evaluation (going left) -->
  <line x1="594" y1="182" x2="582" y2="182" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Stage 7: Evaluation (amber) -->
  <rect x="448" y="156" width="132" height="52" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="514" y="178" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#92400E">Evaluation</text>
  <text x="514" y="197" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#F59E0B">test set + metrics</text>

  <!-- arrow Evaluation to Deployment -->
  <line x1="448" y1="182" x2="436" y2="182" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Stage 8: Deployment (purple) -->
  <rect x="302" y="156" width="132" height="52" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="368" y="178" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#4C1D95">Deployment</text>
  <text x="368" y="197" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#7C3AED">serve predictions</text>

  <!-- arrow Deployment to Monitoring -->
  <line x1="302" y1="182" x2="290" y2="182" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Stage 9: Monitoring (purple) -->
  <rect x="156" y="156" width="132" height="52" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2" filter="url(#card-shadow)"/>
  <text x="222" y="178" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#4C1D95">Monitoring</text>
  <text x="222" y="197" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#7C3AED">track in production</text>

  <!-- ========================================================
       FEEDBACK LOOP 1: Evaluation back to Feature Engineering (dashed, amber)
       From bottom of Evaluation box (514,208) down to y=230, left to x=514, up to Feature Engineering
       ======================================================== -->
  <path d="M514,208 L514,228 L514,228" fill="none" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Horizontal dashed line from x=514 to x=514 (same column, Feature Eng is at x=448-580, center 514) -->
  <!-- Actually Feature Engineering center x=514 too - same column. Draw line from eval bottom to feat eng bottom -->
  <!-- Let me re-route: from right edge of Evaluation(580,182) curve back up to bottom of Feature Engineering(514,112) -->
  <path d="M514,208 L514,238 L390,238 L390,122 L448,122" fill="none"
        stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-back)"/>
  <text x="440" y="253" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#F59E0B" font-style="italic">iterate on features</text>

  <!-- ========================================================
       FEEDBACK LOOP 2: Monitoring back to Problem Framing (dashed, slate)
       From bottom of Monitoring (222,208) down and left back to Problem Framing
       ======================================================== -->
  <path d="M222,208 L222,268 L76,268 L76,122 L76,112" fill="none"
        stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-back)"/>
  <text x="148" y="283" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B" font-style="italic">refine the problem</text>

  <!-- ========================================================
       LEGEND / COLOUR KEY
       ======================================================== -->
  <rect x="10" y="295" width="780" height="1" fill="#E2E8F0"/>

  <circle cx="240" cy="303" r="5" fill="#1E293B"/>
  <text x="250" y="307" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">Framing</text>

  <circle cx="310" cy="303" r="5" fill="#059669"/>
  <text x="320" y="307" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">Data preparation</text>

  <circle cx="410" cy="303" r="5" fill="#0369A1"/>
  <text x="420" y="307" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">Modelling</text>

  <circle cx="480" cy="303" r="5" fill="#F59E0B"/>
  <text x="490" y="307" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">Evaluation</text>

  <circle cx="548" cy="303" r="5" fill="#7C3AED"/>
  <text x="558" y="307" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">Production</text>

</svg>
