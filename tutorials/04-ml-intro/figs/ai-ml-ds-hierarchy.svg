<svg width="800" height="440" viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <!-- Subtle blue glow on outermost ellipse -->
    <filter id="ai-glow" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(3,105,161,0.12)"/>
    </filter>
  </defs>

  <!-- ── Ellipses, back to front ─────────────────────────────────── -->

  <!-- AI: uses ark-concept background + brand primary border -->
  <ellipse cx="285" cy="222" rx="255" ry="187"
           fill="#EAF3FA" stroke="#0369A1" stroke-width="2.5"
           filter="url(#ai-glow)"/>

  <!-- Data Science: ark-activity palette, dashed to signal "overlapping practice" -->
  <ellipse cx="570" cy="216" rx="205" ry="138"
           fill="rgba(235,245,240,0.65)" stroke="#009E73" stroke-width="2"
           stroke-dasharray="7,4"/>

  <!-- ML: lighter brand-blue tint -->
  <ellipse cx="262" cy="238" rx="170" ry="126"
           fill="#DBEAFE" stroke="#0369A1" stroke-width="2"/>

  <!-- Deep Learning: medium-light brand tint -->
  <ellipse cx="246" cy="255" rx="105" ry="76"
           fill="#BFDBFE" stroke="#0369A1" stroke-width="1.5"/>

  <!-- Generative AI: solid brand-dark fill — signals "most recent, most distinctive" -->
  <ellipse cx="237" cy="269" rx="56" ry="37"
           fill="#1E293B" stroke="#0F172A" stroke-width="1.5"/>

  <!-- ── Labels ──────────────────────────────────────────────────── -->

  <!-- AI: inside AI, upper-left, above ML (ML top ≈ y 112) -->
  <text x="132" y="78"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="700" fill="#0369A1">Artificial Intelligence (AI)</text>
  <text x="132" y="93"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="10" font-weight="400" fill="#64748B">Systems that emulate human intelligence</text>

  <!-- ML: inside ML, above DL (DL top ≈ y 179) -->
  <text x="178" y="140"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="12.5" font-weight="700" fill="#1E3A5F">Machine Learning (ML)</text>
  <text x="178" y="154"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="10" font-weight="400" fill="#64748B">Learns patterns from data</text>

  <!-- DL: inside DL, above GenAI (GenAI top ≈ y 232) -->
  <text x="186" y="198"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="12" font-weight="700" fill="#1E293B">Deep Learning (DL)</text>
  <text x="186" y="212"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="10" font-weight="400" fill="#64748B">Multi-layer neural networks</text>

  <!-- GenAI: centred in dark ellipse, white text -->
  <text x="237" y="265"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="10.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Generative AI</text>
  <text x="237" y="279"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="9" font-weight="400" fill="rgba(255,255,255,0.72)" text-anchor="middle">Creates new content</text>

  <!-- DS: upper-right, outside AI boundary (x 610 > AI right ≈ 480 at this height) -->
  <text x="610" y="104"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="700" fill="#065F46" text-anchor="middle">Data Science</text>
  <text x="610" y="119"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="10" font-weight="400" fill="#059669" text-anchor="middle">Statistics · ML · Programming</text>
  <text x="610" y="133"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="10" font-weight="400" fill="#059669" text-anchor="middle">· Domain knowledge</text>

  <!-- "Expert systems" note: inside AI, below ML, outside DS -->
  <text x="350" y="372"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="9.5" fill="#94A3B8" text-anchor="middle" font-style="italic">Expert systems · Rule-based AI</text>

  <!-- "Applied ML" overlap annotation: inside ML ∩ DS, outside DL -->
  <text x="390" y="244"
        font-family="'Jost','Libre Franklin','Segoe UI',system-ui,sans-serif"
        font-size="9" fill="#94A3B8" text-anchor="middle" font-style="italic">Applied ML</text>

</svg>
