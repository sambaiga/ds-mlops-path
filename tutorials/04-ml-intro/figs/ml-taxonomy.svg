<svg width="800" height="448" viewBox="0 0 800 448" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- ── Title ──────────────────────────────────────────────────────────── -->
  <text x="400" y="26" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="15" font-weight="700" fill="#1E293B">
    The ML Taxonomy: Two Independent Dimensions
  </text>
  <text x="400" y="44" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="11" fill="#64748B">
    Every ML problem has a learning paradigm (how it learns) and a task type (what it predicts)
  </text>
  <line x1="60" y1="52" x2="740" y2="52" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════════════════════
       LEFT PANEL: Learning Paradigm
       ══════════════════════════════════════════════════════════════════════ -->
  <!-- Panel card -->
  <rect x="20" y="58" width="362" height="308" rx="10"
        fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <!-- Header (top-rounded, bottom-flat) -->
  <path d="M30,58 L372,58 Q382,58 382,68 L382,128 L20,128 L20,68 Q20,58 30,58 Z"
        fill="#1E293B"/>
  <text x="201" y="81" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="9.5" font-weight="600" fill="#94A3B8" letter-spacing="0.08em">QUESTION 1</text>
  <text x="201" y="100" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13.5" font-weight="700" fill="#FFFFFF">
    How does it learn?
  </text>
  <text x="201" y="117" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="11" fill="#94A3B8">Learning Paradigm</text>

  <!-- Card 1: Supervised (green) -->
  <rect x="34" y="138" width="334" height="40" rx="7"
        fill="#F0FDF4" stroke="#059669" stroke-width="1"/>
  <rect x="34" y="138" width="6"   height="40" rx="3" fill="#059669"/>
  <text x="52" y="153" font-family="'Jost',sans-serif"
        font-size="12" font-weight="700" fill="#065F46">Supervised Learning</text>
  <text x="52" y="168" font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10" fill="#374151">labeled examples: input + known output</text>

  <!-- Card 2: Unsupervised (blue) -->
  <rect x="34" y="186" width="334" height="40" rx="7"
        fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <rect x="34" y="186" width="6"   height="40" rx="3" fill="#3B82F6"/>
  <text x="52" y="201" font-family="'Jost',sans-serif"
        font-size="12" font-weight="700" fill="#1E40AF">Unsupervised Learning</text>
  <text x="52" y="216" font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10" fill="#374151">no labels: discover structure in data</text>

  <!-- Card 3: Self-supervised (amber) -->
  <rect x="34" y="234" width="334" height="40" rx="7"
        fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <rect x="34" y="234" width="6"   height="40" rx="3" fill="#F59E0B"/>
  <text x="52" y="249" font-family="'Jost',sans-serif"
        font-size="12" font-weight="700" fill="#92400E">Self-supervised Learning</text>
  <text x="52" y="264" font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10" fill="#374151">data generates its own labels</text>

  <!-- Card 4: Reinforcement (purple) -->
  <rect x="34" y="282" width="334" height="40" rx="7"
        fill="#FDF4FF" stroke="#A855F7" stroke-width="1"/>
  <rect x="34" y="282" width="6"   height="40" rx="3" fill="#A855F7"/>
  <text x="52" y="297" font-family="'Jost',sans-serif"
        font-size="12" font-weight="700" fill="#6B21A8">Reinforcement Learning</text>
  <text x="52" y="312" font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10" fill="#374151">learns from interaction and reward signal</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       CENTRE: orthogonal indicator
       ══════════════════════════════════════════════════════════════════════ -->
  <line x1="400" y1="128" x2="400" y2="366"
        stroke="#CBD5E1" stroke-width="1" stroke-dasharray="5,3"/>
  <circle cx="400" cy="248" r="24" fill="#1E293B"/>
  <text x="400" y="244" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">x</text>
  <text x="400" y="260" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8">orthogonal</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       RIGHT PANEL: Task Type
       ══════════════════════════════════════════════════════════════════════ -->
  <rect x="418" y="58" width="362" height="308" rx="10"
        fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <!-- Header -->
  <path d="M428,58 L770,58 Q780,58 780,68 L780,128 L418,128 L418,68 Q418,58 428,58 Z"
        fill="#1E293B"/>
  <text x="599" y="81" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="9.5" font-weight="600" fill="#94A3B8" letter-spacing="0.08em">QUESTION 2</text>
  <text x="599" y="100" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13.5" font-weight="700" fill="#FFFFFF">
    What does it predict?
  </text>
  <text x="599" y="117" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="11" fill="#94A3B8">Task Type</text>

  <!-- Task chips: 2-column, inner area x=432..766 (w=334), gap=8, chip w=163 -->
  <!-- Row 1: Classification | Regression -->
  <rect x="432" y="138" width="163" height="36" rx="18"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1"/>
  <text x="514" y="152" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Classification</text>
  <text x="514" y="165" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#334155">a category from a fixed set</text>

  <rect x="603" y="138" width="163" height="36" rx="18"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1"/>
  <text x="685" y="152" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Regression</text>
  <text x="685" y="165" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#334155">a continuous number</text>

  <!-- Row 2: Forecasting | Ranking -->
  <rect x="432" y="182" width="163" height="36" rx="18"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1"/>
  <text x="514" y="196" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Forecasting</text>
  <text x="514" y="209" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#334155">sequence of future values</text>

  <rect x="603" y="182" width="163" height="36" rx="18"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1"/>
  <text x="685" y="196" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Ranking</text>
  <text x="685" y="209" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#334155">ordered list by relevance</text>

  <!-- Row 3: Generation | Clustering -->
  <rect x="432" y="226" width="163" height="36" rx="18"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1"/>
  <text x="514" y="240" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Generation</text>
  <text x="514" y="253" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#334155">new text, image, or code</text>

  <rect x="603" y="226" width="163" height="36" rx="18"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1"/>
  <text x="685" y="240" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Clustering</text>
  <text x="685" y="253" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#334155">group assignments, no labels</text>

  <!-- Row 4: Anomaly Detection (centred) -->
  <rect x="516" y="270" width="166" height="36" rx="18"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1"/>
  <text x="599" y="284" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Anomaly Detection</text>
  <text x="599" y="297" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#334155">flag unusual examples</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       EXAMPLE COMBINATIONS BAR
       ══════════════════════════════════════════════════════════════════════ -->
  <rect x="20" y="378" width="760" height="60" rx="8"
        fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>

  <text x="400" y="396" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="600"
        fill="#94A3B8" letter-spacing="0.07em">
    ORTHOGONAL: any paradigm can pair with any task type
  </text>

  <!-- Example 1 -->
  <text x="170" y="417" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700">
    <tspan fill="#065F46">Supervised</tspan>
    <tspan fill="#94A3B8"> + </tspan>
    <tspan fill="#0369A1">Classification</tspan>
  </text>
  <text x="170" y="430" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#64748B">
    spam filter · disease diagnosis
  </text>

  <line x1="320" y1="390" x2="320" y2="434" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Example 2 -->
  <text x="400" y="417" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700">
    <tspan fill="#1E40AF">Unsupervised</tspan>
    <tspan fill="#94A3B8"> + </tspan>
    <tspan fill="#0369A1">Clustering</tspan>
  </text>
  <text x="400" y="430" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#64748B">
    customer segments · usage profiles
  </text>

  <line x1="488" y1="390" x2="488" y2="434" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Example 3 -->
  <text x="634" y="417" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700">
    <tspan fill="#92400E">Self-supervised</tspan>
    <tspan fill="#94A3B8"> + </tspan>
    <tspan fill="#0369A1">Generation</tspan>
  </text>
  <text x="634" y="430" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#64748B">
    ChatGPT · GitHub Copilot
  </text>

</svg>
