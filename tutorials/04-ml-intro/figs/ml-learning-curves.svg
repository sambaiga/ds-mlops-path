<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="ax" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Reading Learning Curves</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">The shape of the training and validation error curves reveals the failure mode</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ========================================================
       PANEL 1: Underfitting (high bias)
       x=10, y=56, w=245, h=220
       Chart area: x=50-240, y=70-200 (w=190, h=130)
       ======================================================== -->
  <rect x="10" y="56" width="245" height="248" rx="10"
        fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <!-- Header -->
  <path d="M20,56 L245,56 Q255,56 255,66 L255,100 L10,100 L10,66 Q10,56 20,56 Z"
        fill="#EF4444"/>
  <text x="132" y="75" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11.5" font-weight="700" fill="#FFFFFF">Underfitting</text>
  <text x="132" y="91" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#FECACA">High Bias</text>

  <!-- Chart axes -->
  <!-- Y axis: x=50, from y=200 to y=110 -->
  <line x1="50" y1="200" x2="50" y2="108" stroke="#CBD5E1" stroke-width="1.2" marker-end="url(#ax)"/>
  <!-- X axis: y=200, from x=50 to x=240 -->
  <line x1="50" y1="200" x2="242" y2="200" stroke="#CBD5E1" stroke-width="1.2" marker-end="url(#ax)"/>

  <!-- Axis labels -->
  <text x="132" y="217" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8">Training data size</text>
  <text x="36" y="155" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8"
        transform="rotate(-90,36,155)">Error</text>

  <!-- Training curve: starts high, stays high (flattens at high error) -->
  <!-- Points: (55,175), (85,165), (115,160), (145,158), (175,157), (205,156), (235,156) -->
  <polyline points="55,175 85,165 115,160 145,158 175,157 205,156 235,156"
            fill="none" stroke="#0369A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Validation curve: also high, converges toward training (both plateau at high error) -->
  <!-- Points: (55,185), (85,172), (115,166), (145,163), (175,161), (205,160), (235,159) -->
  <polyline points="55,185 85,172 115,166 145,163 175,161 205,160 235,159"
            fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Both curves plateau annotation -->
  <line x1="170" y1="150" x2="190" y2="140" stroke="#EF4444" stroke-width="1"/>
  <text x="192" y="138" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#EF4444">both plateau</text>
  <text x="192" y="148" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#EF4444">at high error</text>

  <!-- Interpretation -->
  <text x="132" y="228" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="600" fill="#DC2626">Both curves are high and close.</text>
  <text x="132" y="241" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">Model too simple to learn</text>
  <text x="132" y="253" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">the pattern. More data will</text>
  <text x="132" y="265" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">not help. Use a more complex</text>
  <text x="132" y="277" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">model or richer features.</text>

  <!-- ========================================================
       PANEL 2: Good Fit
       x=277, y=56, w=245, h=248
       ======================================================== -->
  <rect x="277" y="56" width="245" height="248" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <path d="M287,56 L512,56 Q522,56 522,66 L522,100 L277,100 L277,66 Q277,56 287,56 Z"
        fill="#059669"/>
  <text x="399" y="75" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11.5" font-weight="700" fill="#FFFFFF">Good Fit</text>
  <text x="399" y="91" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#D1FAE5">Low Bias, Low Variance</text>

  <!-- Chart axes -->
  <line x1="317" y1="200" x2="317" y2="108" stroke="#CBD5E1" stroke-width="1.2" marker-end="url(#ax)"/>
  <line x1="317" y1="200" x2="509" y2="200" stroke="#CBD5E1" stroke-width="1.2" marker-end="url(#ax)"/>

  <text x="399" y="217" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8">Training data size</text>
  <text x="303" y="155" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8"
        transform="rotate(-90,303,155)">Error</text>

  <!-- Training curve: drops steeply, flattens at LOW error -->
  <polyline points="322,180 352,155 382,138 412,128 442,123 472,120 502,119"
            fill="none" stroke="#0369A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Validation curve: drops, converges close to training at low error (small gap) -->
  <polyline points="322,190 352,163 382,147 412,136 442,130 472,126 502,124"
            fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- "Small gap" annotation -->
  <line x1="502" y1="119" x2="515" y2="119" stroke="#0369A1" stroke-width="1"/>
  <line x1="502" y1="124" x2="515" y2="124" stroke="#059669" stroke-width="1"/>
  <line x1="515" y1="119" x2="515" y2="124" stroke="#64748B" stroke-width="1"/>
  <text x="517" y="124" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#059669">small</text>
  <text x="517" y="133" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#059669">gap</text>

  <!-- Interpretation -->
  <text x="399" y="228" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="600" fill="#065F46">Both curves low and converging.</text>
  <text x="399" y="241" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">Model has learned the pattern</text>
  <text x="399" y="253" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">and generalises well. Compare</text>
  <text x="399" y="265" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">performance to the acceptable</text>
  <text x="399" y="277" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">threshold in the spec card.</text>

  <!-- ========================================================
       PANEL 3: Overfitting (high variance)
       x=544, y=56, w=245, h=248
       ======================================================== -->
  <rect x="544" y="56" width="245" height="248" rx="10"
        fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <path d="M554,56 L779,56 Q789,56 789,66 L789,100 L544,100 L544,66 Q544,56 554,56 Z"
        fill="#F59E0B"/>
  <text x="666" y="75" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11.5" font-weight="700" fill="#FFFFFF">Overfitting</text>
  <text x="666" y="91" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#FEF3C7">High Variance</text>

  <!-- Chart axes -->
  <line x1="584" y1="200" x2="584" y2="108" stroke="#CBD5E1" stroke-width="1.2" marker-end="url(#ax)"/>
  <line x1="584" y1="200" x2="776" y2="200" stroke="#CBD5E1" stroke-width="1.2" marker-end="url(#ax)"/>

  <text x="666" y="217" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8">Training data size</text>
  <text x="570" y="155" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8"
        transform="rotate(-90,570,155)">Error</text>

  <!-- Training curve: drops to very low error (memorising training data) -->
  <polyline points="589,182 619,148 649,128 679,116 709,112 739,110 769,109"
            fill="none" stroke="#0369A1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Validation curve: drops then plateaus at MUCH higher error (large persistent gap) -->
  <polyline points="589,188 619,168 649,158 679,155 709,154 739,153 769,153"
            fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Large gap annotation -->
  <line x1="769" y1="109" x2="783" y2="109" stroke="#0369A1" stroke-width="1"/>
  <line x1="769" y1="153" x2="783" y2="153" stroke="#EF4444" stroke-width="1"/>
  <line x1="783" y1="109" x2="783" y2="153" stroke="#64748B" stroke-width="1.2"/>
  <text x="785" y="133" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#DC2626">large</text>
  <text x="785" y="143" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#DC2626">gap</text>

  <!-- Interpretation -->
  <text x="666" y="228" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="600" fill="#92400E">Train low, val much higher.</text>
  <text x="666" y="241" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">Model memorised training data.</text>
  <text x="666" y="253" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">Add more training data,</text>
  <text x="666" y="265" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">apply regularisation, or use</text>
  <text x="666" y="277" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">a simpler model.</text>

  <!-- ========================================================
       LEGEND
       ======================================================== -->
  <line x1="10" y1="311" x2="790" y2="311" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="290" y1="322" x2="316" y2="322" stroke="#0369A1" stroke-width="2"/>
  <text x="320" y="326" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Training error</text>
  <line x1="410" y1="322" x2="436" y2="322" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="440" y="326" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Validation error</text>

</svg>
