<svg width="800" height="530" viewBox="0 0 800 530" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94A3B8"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#059669"/>
    </marker>
    <marker id="arr-p" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#A855F7"/>
    </marker>
    <marker id="arr-a" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#D97706"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="26" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="15" font-weight="700" fill="#1E293B">The Four Learning Paradigms</text>
  <text x="400" y="44" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="11" fill="#64748B">Each paradigm defines how a model acquires knowledge from data</text>
  <line x1="40" y1="52" x2="760" y2="52" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ========================================================
       PANEL 1: Supervised Learning (green)
       x=10, y=58, w=383, h=228 -> bottom y=286
       ======================================================== -->
  <rect x="10" y="58" width="383" height="228" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M20,58 L383,58 Q393,58 393,68 L393,110 L10,110 L10,68 Q10,58 20,58 Z"
        fill="#059669"/>
  <text x="201" y="81" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Supervised Learning</text>
  <text x="201" y="98" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#D1FAE5">How: labeled examples, input + known output</text>

  <!-- column headers -->
  <text x="68" y="122" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" letter-spacing="0.06em" fill="#94A3B8">INPUT</text>
  <text x="151" y="122" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" letter-spacing="0.06em" fill="#94A3B8">LABEL</text>

  <!-- Pair 1 -->
  <rect x="24" y="126" width="88" height="17" rx="4" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
  <text x="68" y="138" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">email text</text>
  <line x1="112" y1="134" x2="122" y2="134" stroke="#059669" stroke-width="1" marker-end="url(#arr-g)"/>
  <rect x="124" y="126" width="54" height="17" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="0.8"/>
  <text x="151" y="138" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46" font-weight="600">spam</text>

  <!-- Pair 2 -->
  <rect x="24" y="147" width="88" height="17" rx="4" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
  <text x="68" y="159" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">house data</text>
  <line x1="112" y1="155" x2="122" y2="155" stroke="#059669" stroke-width="1" marker-end="url(#arr-g)"/>
  <rect x="124" y="147" width="54" height="17" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="0.8"/>
  <text x="151" y="159" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46" font-weight="600">$450k</text>

  <!-- Pair 3 -->
  <rect x="24" y="168" width="88" height="17" rx="4" fill="#FFFFFF" stroke="#86EFAC" stroke-width="1"/>
  <text x="68" y="180" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">patient scan</text>
  <line x1="112" y1="176" x2="122" y2="176" stroke="#059669" stroke-width="1" marker-end="url(#arr-g)"/>
  <rect x="124" y="168" width="54" height="17" rx="4" fill="#D1FAE5" stroke="#059669" stroke-width="0.8"/>
  <text x="151" y="180" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46" font-weight="600">positive</text>

  <!-- arrow pairs -> model -->
  <line x1="182" y1="155" x2="202" y2="155" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- Model box -->
  <rect x="204" y="142" width="72" height="26" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.5"/>
  <text x="240" y="159" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#065F46">Model</text>

  <!-- model -> prediction -->
  <line x1="276" y1="155" x2="294" y2="155" stroke="#94A3B8" stroke-width="1.4" marker-end="url(#arr)"/>
  <rect x="296" y="142" width="76" height="26" rx="6" fill="#059669"/>
  <text x="334" y="159" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Predict</text>

  <!-- description -->
  <text x="201" y="208" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">Learn by example. Each training instance pairs an input</text>
  <text x="201" y="221" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">with a correct output. Parameters adjust to match labels.</text>

  <!-- footer -->
  <line x1="24" y1="233" x2="376" y2="233" stroke="#D1FAE5" stroke-width="1"/>
  <text x="201" y="249" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#059669">spam filter · house prices · disease diagnosis</text>

  <!-- ========================================================
       PANEL 2: Unsupervised Learning (blue)
       x=407, y=58, w=383, h=228 -> bottom y=286
       ======================================================== -->
  <rect x="407" y="58" width="383" height="228" rx="10"
        fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M417,58 L780,58 Q790,58 790,68 L790,110 L407,110 L407,68 Q407,58 417,58 Z"
        fill="#3B82F6"/>
  <text x="598" y="81" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Unsupervised Learning</text>
  <text x="598" y="98" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#DBEAFE">How: no labels, discover hidden structure</text>

  <text x="598" y="122" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" letter-spacing="0.06em" fill="#94A3B8">NO LABELS PROVIDED</text>

  <!-- Cluster 1 (blue, left) -->
  <circle cx="460" cy="149" r="6" fill="#3B82F6" opacity="0.75"/>
  <circle cx="474" cy="138" r="5" fill="#3B82F6" opacity="0.75"/>
  <circle cx="468" cy="163" r="5.5" fill="#3B82F6" opacity="0.75"/>
  <circle cx="449" cy="158" r="4.5" fill="#3B82F6" opacity="0.75"/>
  <ellipse cx="463" cy="152" rx="22" ry="19" fill="none" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="463" y="182" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#3B82F6">Group A</text>

  <!-- Cluster 2 (teal, centre) -->
  <circle cx="565" cy="144" r="5.5" fill="#0891B2" opacity="0.75"/>
  <circle cx="581" cy="156" r="6" fill="#0891B2" opacity="0.75"/>
  <circle cx="570" cy="166" r="5" fill="#0891B2" opacity="0.75"/>
  <circle cx="552" cy="158" r="4.5" fill="#0891B2" opacity="0.75"/>
  <ellipse cx="567" cy="156" rx="22" ry="19" fill="none" stroke="#0891B2" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="567" y="186" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#0891B2">Group B</text>

  <!-- Cluster 3 (indigo, right) -->
  <circle cx="672" cy="148" r="6" fill="#6366F1" opacity="0.75"/>
  <circle cx="688" cy="138" r="5" fill="#6366F1" opacity="0.75"/>
  <circle cx="693" cy="162" r="5.5" fill="#6366F1" opacity="0.75"/>
  <circle cx="677" cy="166" r="4.5" fill="#6366F1" opacity="0.75"/>
  <ellipse cx="682" cy="153" rx="22" ry="19" fill="none" stroke="#6366F1" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="682" y="183" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#6366F1">Group C</text>

  <!-- description -->
  <text x="598" y="205" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">No labels provided. Finds hidden patterns, groupings,</text>
  <text x="598" y="218" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">and structure in unlabeled data on its own.</text>

  <!-- footer -->
  <line x1="421" y1="231" x2="775" y2="231" stroke="#BFDBFE" stroke-width="1"/>
  <text x="598" y="248" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#3B82F6">customer segments · topic models · anomaly detection</text>

  <!-- ========================================================
       PANEL 3: Self-supervised Learning (amber)
       x=10, y=295, w=383, h=228 -> bottom y=523
       ======================================================== -->
  <rect x="10" y="295" width="383" height="228" rx="10"
        fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M20,295 L383,295 Q393,295 393,305 L393,347 L10,347 L10,305 Q10,295 20,295 Z"
        fill="#F59E0B"/>
  <text x="201" y="318" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Self-supervised Learning</text>
  <text x="201" y="335" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#FEF3C7">How: data generates its own labels</text>

  <text x="201" y="360" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" letter-spacing="0.06em" fill="#94A3B8">MASKED TOKEN PREDICTION</text>

  <!-- Token row centred at x=201, tokens starting x=102 -->
  <rect x="102" y="367" width="28" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="116" y="379" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">The</text>

  <rect x="134" y="367" width="26" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="147" y="379" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">cat</text>

  <rect x="164" y="367" width="26" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="177" y="379" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">sat</text>

  <rect x="194" y="367" width="22" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="205" y="379" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">on</text>

  <rect x="220" y="367" width="26" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="233" y="379" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">the</text>

  <!-- MASK token -->
  <rect x="250" y="365" width="32" height="22" rx="5" fill="#F59E0B"/>
  <text x="266" y="380" text-anchor="middle" font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">?</text>

  <rect x="286" y="367" width="14" height="18" rx="4" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="293" y="379" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151">.</text>

  <!-- arrow down from mask -->
  <line x1="266" y1="388" x2="266" y2="400" stroke="#F59E0B" stroke-width="1.5"/>
  <polygon points="262,400 266,407 270,400" fill="#F59E0B"/>

  <!-- predicted word -->
  <rect x="246" y="409" width="40" height="20" rx="5" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="266" y="423" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#92400E">mat</text>

  <!-- annotation -->
  <text x="201" y="443" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#92400E" font-style="italic">the original text is its own label: no human annotation needed</text>

  <!-- description -->
  <text x="201" y="461" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">Labels come from the data itself. Mask a word, hide a</text>
  <text x="201" y="474" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">frame, or scramble a patch, then predict the original.</text>

  <!-- footer -->
  <line x1="24" y1="486" x2="376" y2="486" stroke="#FDE68A" stroke-width="1"/>
  <text x="201" y="501" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#92400E">GPT pre-training · BERT · image generation models</text>

  <!-- ========================================================
       PANEL 4: Reinforcement Learning (purple)
       x=407, y=295, w=383, h=228 -> bottom y=523
       ======================================================== -->
  <rect x="407" y="295" width="383" height="228" rx="10"
        fill="#FDF4FF" stroke="#A855F7" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M417,295 L780,295 Q790,295 790,305 L790,347 L407,347 L407,305 Q407,295 417,295 Z"
        fill="#A855F7"/>
  <text x="598" y="318" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Reinforcement Learning</text>
  <text x="598" y="335" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#F3E8FF">How: trial, error, and reward signals</text>

  <!-- Agent box: x=434, y=360, w=80, h=40 -->
  <rect x="434" y="360" width="80" height="40" rx="8" fill="#FFFFFF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="474" y="377" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#6B21A8">Agent</text>
  <text x="474" y="392" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#6B7280">policy</text>

  <!-- Environment box: x=672, y=360, w=96, h=40 -->
  <rect x="672" y="360" width="96" height="40" rx="8" fill="#FFFFFF" stroke="#A855F7" stroke-width="1.5"/>
  <text x="720" y="377" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#6B21A8">Environment</text>
  <text x="720" y="392" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#6B7280">state + rules</text>

  <!-- Action arrow (upper lane): agent right (514) to env left (672), y=371 -->
  <line x1="514" y1="371" x2="668" y2="371" stroke="#A855F7" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="591" y="365" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#A855F7">action</text>

  <!-- Reward arrow (lower lane): env left (672) to agent right (514), y=389 -->
  <line x1="672" y1="389" x2="516" y2="389" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <text x="591" y="408" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#D97706">reward / penalty</text>

  <!-- description -->
  <text x="598" y="428" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">An agent acts in an environment, receives reward or penalty,</text>
  <text x="598" y="441" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#374151">and learns a policy to maximise cumulative reward.</text>

  <!-- footer -->
  <line x1="421" y1="455" x2="775" y2="455" stroke="#E9D5FF" stroke-width="1"/>
  <text x="598" y="470" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#A855F7">AlphaGo · robot control · energy management</text>

</svg>
