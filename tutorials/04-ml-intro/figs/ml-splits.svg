<svg width="800" height="310" viewBox="0 0 800 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">How to Split Time-Series Data</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">For time-ordered data, only a chronological split preserves the causal structure</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ========================================================
       LEFT PANEL: Random Split (Incorrect)
       x=10, y=56, w=375, h=238
       ======================================================== -->
  <rect x="10" y="56" width="375" height="238" rx="10"
        fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <!-- Header -->
  <path d="M20,56 L375,56 Q385,56 385,66 L385,104 L10,104 L10,66 Q10,56 20,56 Z"
        fill="#EF4444"/>
  <text x="197" y="77" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Random Split</text>
  <text x="197" y="93" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#FECACA">Incorrect for time-series data</text>

  <!-- Timeline bar -->
  <rect x="30" y="118" width="345" height="10" rx="5" fill="#E2E8F0"/>
  <!-- Time axis labels -->
  <text x="30" y="145" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">Month 1</text>
  <text x="330" y="145" text-anchor="end" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">Month 24</text>
  <text x="197" y="145" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8">time</text>

  <!-- Scattered dots: train (blue), val (amber), test (green) randomly placed -->
  <!-- Row 1 of dots -->
  <circle cx="48"  cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="68"  cy="165" r="5" fill="#F59E0B" opacity="0.85"/>
  <circle cx="88"  cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="108" cy="165" r="5" fill="#059669" opacity="0.85"/>
  <circle cx="128" cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="148" cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="168" cy="165" r="5" fill="#059669" opacity="0.85"/>
  <circle cx="188" cy="165" r="5" fill="#F59E0B" opacity="0.85"/>
  <circle cx="208" cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="228" cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="248" cy="165" r="5" fill="#F59E0B" opacity="0.85"/>
  <circle cx="268" cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="288" cy="165" r="5" fill="#059669" opacity="0.85"/>
  <circle cx="308" cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="328" cy="165" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="348" cy="165" r="5" fill="#F59E0B" opacity="0.85"/>
  <!-- Row 2 -->
  <circle cx="58"  cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="78"  cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="98"  cy="188" r="5" fill="#F59E0B" opacity="0.85"/>
  <circle cx="118" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="138" cy="188" r="5" fill="#059669" opacity="0.85"/>
  <circle cx="158" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="178" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="198" cy="188" r="5" fill="#059669" opacity="0.85"/>
  <circle cx="218" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="238" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="258" cy="188" r="5" fill="#F59E0B" opacity="0.85"/>
  <circle cx="278" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="298" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="318" cy="188" r="5" fill="#059669" opacity="0.85"/>
  <circle cx="338" cy="188" r="5" fill="#0369A1" opacity="0.85"/>
  <circle cx="358" cy="188" r="5" fill="#0369A1" opacity="0.85"/>

  <!-- Warning annotation -->
  <text x="197" y="218" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#DC2626" font-weight="600">Training data contains future readings.</text>
  <text x="197" y="232" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#DC2626">The model has seen the future during training.</text>
  <text x="197" y="246" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#64748B">Test performance will be better than</text>
  <text x="197" y="259" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#64748B">real-world performance. Temporal leakage.</text>

  <!-- ========================================================
       RIGHT PANEL: Temporal Split (Correct)
       x=415, y=56, w=375, h=238
       ======================================================== -->
  <rect x="415" y="56" width="375" height="238" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <!-- Header -->
  <path d="M425,56 L780,56 Q790,56 790,66 L790,104 L415,104 L415,66 Q415,56 425,56 Z"
        fill="#059669"/>
  <text x="602" y="77" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Temporal Split</text>
  <text x="602" y="93" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#D1FAE5">Correct for time-series data</text>

  <!-- Timeline bar with three coloured segments -->
  <!-- Train block (months 1-18): x=435 to x=605 (170px of 345 total = 49%) but let's use 60/20/20 -->
  <!-- Total bar width: 345px, from x=435 to x=780 -->
  <!-- Train 60%: 207px, x=435 to 642 -->
  <!-- Val 20%: 69px, x=642 to 711 -->
  <!-- Test 20%: 69px, x=711 to 780 -->

  <rect x="435" y="118" width="207" height="18" rx="0" fill="#0369A1" opacity="0.75"/>
  <rect x="642" y="118" width="69"  height="18" rx="0" fill="#F59E0B" opacity="0.85"/>
  <rect x="711" y="118" width="69"  height="18" rx="0" fill="#059669" opacity="0.85"/>

  <!-- Block labels inside bars -->
  <text x="538" y="131" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Train</text>
  <text x="676" y="131" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">Val</text>
  <text x="745" y="131" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">Test</text>

  <!-- Boundary tick marks -->
  <line x1="642" y1="114" x2="642" y2="140" stroke="#1E293B" stroke-width="1.5"/>
  <line x1="711" y1="114" x2="711" y2="140" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Time axis labels -->
  <text x="435" y="152" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">Month 1</text>
  <text x="642" y="152" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">Month 15</text>
  <text x="711" y="152" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">Month 20</text>
  <text x="780" y="152" text-anchor="end" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">Month 24</text>

  <!-- Key rules -->
  <text x="602" y="178" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#065F46" font-weight="600">Training data is always older than test data.</text>
  <text x="602" y="192" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#065F46">The model never sees future information.</text>
  <text x="602" y="212" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#374151">Split chronologically: train on the</text>
  <text x="602" y="226" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#374151">earliest period, test on the most recent.</text>
  <text x="602" y="246" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#059669" font-style="italic">Reflects how the model will operate in production.</text>

  <!-- ========================================================
       BOTTOM LEGEND
       ======================================================== -->
  <line x1="10" y1="298" x2="790" y2="298" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="266" cy="306" r="5" fill="#0369A1" opacity="0.85"/>
  <text x="276" y="310" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Training set</text>
  <circle cx="346" cy="306" r="5" fill="#F59E0B" opacity="0.85"/>
  <text x="356" y="310" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Validation set</text>
  <circle cx="426" cy="306" r="5" fill="#059669" opacity="0.85"/>
  <text x="436" y="310" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Test set (touched once)</text>

</svg>
