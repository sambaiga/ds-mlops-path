<svg width="800" height="278" viewBox="0 0 800 278" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="card-shadow" x="-6%" y="-6%" width="114%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.10)"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────────────────── -->
  <text x="400" y="26" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="15" font-weight="700" fill="#1E293B">
    The Three Steps of Machine Learning
  </text>
  <line x1="90" y1="36" x2="710" y2="36" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════════════════════════
       CARD 1 : Identify a Pattern   (activity green)
       ══════════════════════════════════════════════════════════════════════ -->
  <rect x="22" y="62" width="222" height="155" rx="10"
        fill="#EBF5F0" stroke="#009E73" stroke-width="1.5" filter="url(#card-shadow)"/>

  <!-- step badge -->
  <circle cx="133" cy="62" r="14" fill="#009E73"/>
  <text x="133" y="67" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">1</text>

  <!-- data-rows icon -->
  <rect x="113" y="82" width="40" height="5" rx="2.5" fill="#009E73" opacity="0.80"/>
  <rect x="118" y="92" width="30" height="5" rx="2.5" fill="#009E73" opacity="0.55"/>
  <rect x="115" y="102" width="36" height="5" rx="2.5" fill="#009E73" opacity="0.35"/>

  <!-- title + rule -->
  <text x="133" y="126" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12.5" font-weight="700" fill="#065F46">
    Identify a Pattern
  </text>
  <line x1="42" y1="134" x2="224" y2="134" stroke="#009E73" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- body -->
  <text x="133" y="151" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    Expose the algorithm to
  </text>
  <text x="133" y="165" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    historical examples with
  </text>
  <text x="133" y="179" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    known inputs and outputs
  </text>
  <text x="133" y="203" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#059669"
        font-style="italic">labeled training data</text>

  <!-- ── Arrow 1 ───────────────────────────────────────────────────────── -->
  <line x1="248" y1="140" x2="282" y2="140" stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════════
       CARD 2 : Build a Model   (primary blue)
       ══════════════════════════════════════════════════════════════════════ -->
  <rect x="290" y="62" width="222" height="155" rx="10"
        fill="#EAF3FA" stroke="#0369A1" stroke-width="1.5" filter="url(#card-shadow)"/>

  <circle cx="401" cy="62" r="14" fill="#0369A1"/>
  <text x="401" y="67" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">2</text>

  <!-- mini neural-network icon -->
  <circle cx="372" cy="88" r="5" fill="#0369A1" opacity="0.65"/>
  <circle cx="372" cy="104" r="5" fill="#0369A1" opacity="0.65"/>
  <circle cx="401" cy="96" r="6" fill="#0369A1"/>
  <circle cx="430" cy="96" r="5" fill="#0369A1" opacity="0.65"/>
  <line x1="377" y1="88" x2="395" y2="93" stroke="#0369A1" stroke-width="1.2" stroke-opacity="0.45"/>
  <line x1="377" y1="104" x2="395" y2="99" stroke="#0369A1" stroke-width="1.2" stroke-opacity="0.45"/>
  <line x1="407" y1="96" x2="425" y2="96" stroke="#0369A1" stroke-width="1.2" stroke-opacity="0.45"/>

  <text x="401" y="126" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12.5" font-weight="700" fill="#1E3A5F">
    Build a Model
  </text>
  <line x1="310" y1="134" x2="492" y2="134" stroke="#0369A1" stroke-width="0.6" stroke-opacity="0.4"/>

  <text x="401" y="151" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    Adjust parameters until
  </text>
  <text x="401" y="165" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    predictions match outputs
  </text>
  <text x="401" y="179" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    and generalises to new data
  </text>
  <text x="401" y="203" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#0369A1"
        font-style="italic">captures structure, not examples</text>

  <!-- ── Arrow 2 ───────────────────────────────────────────────────────── -->
  <line x1="516" y1="140" x2="550" y2="140" stroke="#94A3B8" stroke-width="1.5"
        marker-end="url(#arr)"/>

  <!-- ══════════════════════════════════════════════════════════════════════
       CARD 3 : Use the Model   (tip purple)
       ══════════════════════════════════════════════════════════════════════ -->
  <rect x="558" y="62" width="222" height="155" rx="10"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#card-shadow)"/>

  <circle cx="669" cy="62" r="14" fill="#7C3AED"/>
  <text x="669" y="67" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">3</text>

  <!-- target / bullseye icon -->
  <circle cx="669" cy="96" r="18" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.30"/>
  <circle cx="669" cy="96" r="10" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.60"/>
  <circle cx="669" cy="96" r="4"  fill="#7C3AED"/>

  <text x="669" y="126" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12.5" font-weight="700" fill="#4C1D95">
    Use the Model
  </text>
  <line x1="578" y1="134" x2="760" y2="134" stroke="#7C3AED" stroke-width="0.6" stroke-opacity="0.4"/>

  <text x="669" y="151" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    Apply to new, unseen data
  </text>
  <text x="669" y="165" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    the model was never shown
  </text>
  <text x="669" y="179" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10.5" fill="#334155">
    during training
  </text>
  <text x="669" y="203" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#7C3AED"
        font-style="italic">predictions · inferences</text>

  <!-- ══════════════════════════════════════════════════════════════════════
       Training = learning process bracket (under cards 1 + 2)
       ══════════════════════════════════════════════════════════════════════ -->
  <line x1="133" y1="220" x2="133" y2="244" stroke="#0369A1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="401" y1="220" x2="401" y2="244" stroke="#0369A1" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="133" y1="244" x2="401" y2="244" stroke="#0369A1" stroke-width="1.5"/>
  <line x1="133" y1="239" x2="133" y2="249" stroke="#0369A1" stroke-width="1.5"/>
  <line x1="401" y1="239" x2="401" y2="249" stroke="#0369A1" stroke-width="1.5"/>
  <text x="267" y="264" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#0369A1">
    Training = a learning process
  </text>

  <!-- generalisation note under card 3 -->
  <text x="669" y="237" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif" font-size="10" fill="#94A3B8"
        font-style="italic">generalisation: the goal</text>

</svg>
