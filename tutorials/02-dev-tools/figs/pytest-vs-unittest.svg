<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">pytest vs unittest: Same Outcome, Half the Code</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">pytest's autodiscovery and plain assert statements replace the unittest ceremony</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- LEFT PANEL: unittest (red tint) -->
  <rect x="14" y="60" width="340" height="162" rx="10"
        fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="14" y="60" width="340" height="32" rx="10" fill="#DC2626"/>
  <rect x="14" y="78" width="340" height="14" fill="#DC2626"/>
  <text x="184" y="81" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">unittest</text>
  <text x="184" y="94" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#FECACA">stdlib; requires ceremony</text>

  <!-- Bullet items -->
  <circle cx="36" cy="115" r="3.5" fill="#DC2626" opacity="0.7"/>
  <text x="46" y="119" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">subclass TestCase</text>

  <circle cx="36" cy="135" r="3.5" fill="#DC2626" opacity="0.7"/>
  <text x="46" y="139" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">self.assertEqual(), self.assertRaises()</text>

  <circle cx="36" cy="155" r="3.5" fill="#DC2626" opacity="0.7"/>
  <text x="46" y="159" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">setUp / tearDown methods</text>

  <circle cx="36" cy="175" r="3.5" fill="#DC2626" opacity="0.7"/>
  <text x="46" y="179" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">verbose boilerplate</text>

  <circle cx="36" cy="195" r="3.5" fill="#DC2626" opacity="0.7"/>
  <text x="46" y="199" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">python -m unittest discover to run</text>

  <!-- CENTER: same tests label + arrow -->
  <rect x="356" y="118" width="88" height="40" rx="8"
        fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>
  <text x="400" y="135" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#475569">same</text>
  <text x="400" y="149" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#475569">tests</text>

  <!-- Arrow pointing right -->
  <line x1="354" y1="138" x2="310" y2="138" stroke="#64748B" stroke-width="1.5"/>
  <line x1="444" y1="138" x2="490" y2="138" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RIGHT PANEL: pytest (green) -->
  <rect x="446" y="60" width="340" height="162" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="446" y="60" width="340" height="32" rx="10" fill="#059669"/>
  <rect x="446" y="78" width="340" height="14" fill="#059669"/>
  <text x="616" y="81" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">pytest</text>
  <text x="616" y="94" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#D1FAE5">third-party; minimal ceremony</text>

  <!-- Bullet items -->
  <circle cx="468" cy="115" r="3.5" fill="#059669" opacity="0.8"/>
  <text x="478" y="119" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">plain assert statements</text>

  <circle cx="468" cy="135" r="3.5" fill="#059669" opacity="0.8"/>
  <text x="478" y="139" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">autodiscovery of test_*.py files</text>

  <circle cx="468" cy="155" r="3.5" fill="#059669" opacity="0.8"/>
  <text x="478" y="159" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">fixtures replace setUp / tearDown</text>

  <circle cx="468" cy="175" r="3.5" fill="#059669" opacity="0.8"/>
  <text x="478" y="179" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">rich failure output with diffs</text>

  <circle cx="468" cy="195" r="3.5" fill="#059669" opacity="0.8"/>
  <text x="478" y="199" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">pytest  (just one word) to run all</text>
</svg>
