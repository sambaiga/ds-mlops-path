<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow-up" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
      <path d="M0,8 L4,0 L8,8 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Test Pyramid: Many Fast Units, Few Slow End-to-Ends</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Run unit tests on every save; integration pre-push; E2E in CI only</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Pyramid construction:
       Base (Unit):        y=225 to y=265, x left=80, x right=720  (full width 640)
       Middle (Integration): y=150 to y=225, x left=170, x right=630 (width 460)
       Top (E2E):          y=80 to y=150,  x left=290, x right=510 (width 220)

       Slanted edges connect them as a true triangle:
       Apex x=400, y=58 (close to the rule line)
       Left base x=72, y=268
       Right base x=728, y=268
  -->

  <!-- Full triangle clipping shape (behind layers) -->
  <polygon points="400,56 72,268 728,268"
           fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <!-- TOP LAYER: E2E (red) - top triangle slice -->
  <polygon points="400,56 290,150 510,150"
           fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
  <text x="400" y="98" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#DC2626">End-to-End</text>
  <text x="400" y="112" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#991B1B">full pipeline: CSV in, report out</text>
  <text x="400" y="125" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">few tests, minutes each</text>
  <text x="400" y="137" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">run in CI only</text>

  <!-- Divider line between E2E and Integration -->
  <line x1="286" y1="150" x2="514" y2="150" stroke="#DC2626" stroke-width="1.5" opacity="0.5"/>

  <!-- MIDDLE LAYER: Integration (blue) - trapezoid -->
  <polygon points="290,150 170,224 630,224 510,150"
           fill="#DBEAFE" stroke="#0369A1" stroke-width="1.5"/>
  <text x="400" y="176" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#0369A1">Integration Tests</text>
  <text x="400" y="191" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E3A8A">module boundaries: pipeline + I/O</text>
  <text x="400" y="204" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">some tests, seconds each, run pre-push</text>

  <!-- Divider line between Integration and Unit -->
  <line x1="166" y1="224" x2="634" y2="224" stroke="#0369A1" stroke-width="1.5" opacity="0.5"/>

  <!-- BASE LAYER: Unit (green) - bottom trapezoid -->
  <polygon points="170,224 72,268 728,268 630,224"
           fill="#DCFCE7" stroke="#059669" stroke-width="1.5"/>
  <text x="400" y="244" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#059669">Unit Tests</text>
  <text x="400" y="258" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#065F46">single functions: compute_grade, flag_at_risk</text>
  <text x="400" y="270" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">many tests, milliseconds each, run on every save</text>

  <!-- Left side upward arrow: "speed" -->
  <line x1="55" y1="250" x2="55" y2="80" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-up)"/>
  <text x="50" y="170" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#64748B"
        transform="rotate(-90,50,170)">speed</text>

  <!-- Right side upward arrow: "confidence" -->
  <line x1="745" y1="250" x2="745" y2="80" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow-up)"/>
  <text x="750" y="170" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#64748B"
        transform="rotate(90,750,170)">confidence</text>
</svg>
