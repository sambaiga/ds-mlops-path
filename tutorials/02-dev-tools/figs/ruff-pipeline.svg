<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#B45309"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">ruff: Format First, Then Check</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">ruff format handles style; ruff check enforces correctness rules</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Step 1: Source Code -->
  <rect x="14" y="98" width="100" height="50" rx="10"
        fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="64" y="118" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#1E293B">Source Code</text>
  <text x="64" y="133" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">your .py files</text>
  <text x="64" y="145" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">unformatted</text>

  <!-- Arrow 1 -->
  <line x1="114" y1="123" x2="136" y2="123" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: ruff format (purple) -->
  <rect x="140" y="88" width="120" height="70" rx="10"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" filter="url(#panel-shadow)"/>
  <rect x="140" y="88" width="120" height="26" rx="10" fill="#7C3AED"/>
  <rect x="140" y="100" width="120" height="14" fill="#7C3AED"/>
  <text x="200" y="105" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">ruff format</text>
  <text x="200" y="127" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#4C1D95">rewrites code style</text>
  <text x="200" y="140" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">indentation, quotes,</text>
  <text x="200" y="152" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">line length</text>

  <!-- Arrow 2 -->
  <line x1="260" y1="123" x2="282" y2="123" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Formatted Code -->
  <rect x="286" y="98" width="100" height="50" rx="10"
        fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="336" y="118" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#1E293B">Formatted</text>
  <text x="336" y="131" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#1E293B">Code</text>
  <text x="336" y="145" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">style consistent</text>

  <!-- Arrow 3 -->
  <line x1="386" y1="123" x2="408" y2="123" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: ruff check (blue) -->
  <rect x="412" y="88" width="120" height="70" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="2" filter="url(#panel-shadow)"/>
  <rect x="412" y="88" width="120" height="26" rx="10" fill="#0369A1"/>
  <rect x="412" y="100" width="120" height="14" fill="#0369A1"/>
  <text x="472" y="105" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">ruff check</text>
  <text x="472" y="127" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">600+ lint rules</text>
  <text x="472" y="140" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">unused imports,</text>
  <text x="472" y="152" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">undefined names</text>

  <!-- Arrow 4 -->
  <line x1="532" y1="123" x2="554" y2="123" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision diamond -->
  <polygon points="583,108 616,123 583,138 550,123" fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="583" y="120" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" font-weight="700" fill="#92400E">findings</text>
  <text x="583" y="131" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" font-weight="700" fill="#92400E">?</text>

  <!-- YES path: ruff applies fix, loop back -->
  <line x1="583" y1="138" x2="583" y2="185" stroke="#B45309" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="596" y="150" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#B45309">Yes</text>

  <!-- ruff fix box -->
  <rect x="516" y="186" width="134" height="36" rx="8"
        fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="583" y="202" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#92400E">ruff --fix applied</text>
  <text x="583" y="215" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">auto-corrects safe rules</text>

  <!-- Loop back arrow from fix to ruff check -->
  <path d="M516,204 Q472,230 472,158" stroke="#B45309" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>

  <!-- NO path: ready to commit -->
  <line x1="616" y1="123" x2="658" y2="123" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="624" y="116" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#059669">No</text>

  <!-- Ready to commit box -->
  <rect x="662" y="98" width="120" height="50" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="722" y="118" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#065F46">Ready to</text>
  <text x="722" y="131" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#065F46">Commit</text>
  <text x="722" y="145" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#059669">clean + correct</text>
</svg>
