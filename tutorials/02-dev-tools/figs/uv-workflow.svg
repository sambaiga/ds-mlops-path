<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">uv Project Setup: From Init to Run</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">One command creates the project; uv manages everything else automatically</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Step boxes: 6 boxes, each ~108px wide with 10px gaps -->
  <!-- Box widths: (800 - 20 - 20 - 5*10) / 6 = (760 - 50) / 6 = 118px each -->

  <!-- Step 1: uv init (gray) -->
  <rect x="10" y="62" width="118" height="108" rx="10"
        fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="10" y="62" width="118" height="26" rx="10" fill="#64748B"/>
  <rect x="10" y="74" width="118" height="14" fill="#64748B"/>
  <text x="69" y="79" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">1. Init</text>
  <text x="69" y="103" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">uv init</text>
  <text x="69" y="116" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">--package</text>
  <text x="69" y="129" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">project-name</text>
  <text x="69" y="148" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">scaffold project dir</text>
  <text x="69" y="160" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">and git repo</text>

  <!-- Arrow 1-2 -->
  <line x1="128" y1="116" x2="138" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: pyproject.toml (amber) -->
  <rect x="148" y="62" width="118" height="108" rx="10"
        fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="148" y="62" width="118" height="26" rx="10" fill="#B45309"/>
  <rect x="148" y="74" width="118" height="14" fill="#B45309"/>
  <text x="207" y="79" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">2. Metadata</text>
  <text x="207" y="103" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#92400E">pyproject.toml</text>
  <text x="207" y="116" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">[project]</text>
  <text x="207" y="129" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">name, version,</text>
  <text x="207" y="148" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">requires-python,</text>
  <text x="207" y="160" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">dependencies</text>

  <!-- Arrow 2-3 -->
  <line x1="266" y1="116" x2="276" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: uv add (blue) -->
  <rect x="286" y="62" width="118" height="108" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="286" y="62" width="118" height="26" rx="10" fill="#0369A1"/>
  <rect x="286" y="74" width="118" height="14" fill="#0369A1"/>
  <text x="345" y="79" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">3. Add deps</text>
  <text x="345" y="103" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">uv add pandas</text>
  <text x="345" y="116" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">uv add --optional</text>
  <text x="345" y="128" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">dev ruff</text>
  <text x="345" y="148" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">writes to</text>
  <text x="345" y="160" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">pyproject.toml</text>

  <!-- Arrow 3-4 -->
  <line x1="404" y1="116" x2="414" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: uv.lock (green, emphasized) -->
  <rect x="424" y="58" width="118" height="116" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="2.5" filter="url(#panel-shadow)"/>
  <rect x="424" y="58" width="118" height="26" rx="10" fill="#059669"/>
  <rect x="424" y="70" width="118" height="14" fill="#059669"/>
  <text x="483" y="75" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">4. Lock file</text>
  <text x="483" y="99" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#065F46">uv.lock</text>
  <text x="483" y="112" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">full dep tree</text>
  <text x="483" y="124" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">pinned + reproducible</text>
  <text x="483" y="144" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#059669">commit this file</text>
  <text x="483" y="156" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#059669">to version control</text>

  <!-- Arrow 4-5 -->
  <line x1="542" y1="116" x2="552" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: uv sync (blue) -->
  <rect x="562" y="62" width="118" height="108" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="562" y="62" width="118" height="26" rx="10" fill="#0369A1"/>
  <rect x="562" y="74" width="118" height="14" fill="#0369A1"/>
  <text x="621" y="79" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">5. Sync env</text>
  <text x="621" y="103" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">uv sync</text>
  <text x="621" y="116" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">.venv created</text>
  <text x="621" y="148" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">installs exact</text>
  <text x="621" y="160" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">locked versions</text>

  <!-- Arrow 5-6 -->
  <line x1="680" y1="116" x2="690" y2="116" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: uv run (blue) -->
  <rect x="700" y="62" width="90" height="108" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="700" y="62" width="90" height="26" rx="10" fill="#0369A1"/>
  <rect x="700" y="74" width="90" height="14" fill="#0369A1"/>
  <text x="745" y="79" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">6. Run</text>
  <text x="745" y="103" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">uv run</text>
  <text x="745" y="115" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">script.py</text>
  <text x="745" y="148" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">no activation</text>
  <text x="745" y="160" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">needed</text>
</svg>
