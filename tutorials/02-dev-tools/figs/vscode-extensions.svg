<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">VS Code Extension Stack for Python Data Science</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Four extension groups that together give you full IDE support</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- CENTER: VS Code box -->
  <rect x="310" y="120" width="180" height="80" rx="10"
        fill="#1E293B" stroke="#0369A1" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="400" y="153" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">VS Code</text>
  <text x="400" y="171" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#94A3B8">Hub for all extensions</text>
  <text x="400" y="188" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">settings.json + extensions.json</text>

  <!-- Connector lines: center-left top -->
  <line x1="310" y1="143" x2="212" y2="103" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Connector lines: center-right top -->
  <line x1="490" y1="143" x2="588" y2="103" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Connector lines: center-left bottom -->
  <line x1="310" y1="177" x2="212" y2="217" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Connector lines: center-right bottom -->
  <line x1="490" y1="177" x2="588" y2="217" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- TOP-LEFT: Python Layer (blue) -->
  <rect x="10" y="58" width="202" height="90" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="10" y="58" width="202" height="28" rx="10" fill="#0369A1"/>
  <rect x="10" y="72" width="202" height="14" fill="#0369A1"/>
  <text x="111" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#FFFFFF">Python Layer</text>
  <text x="22" y="103" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">Python  ms-python.python</text>
  <text x="22" y="117" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">Pylance  ms-python.vscode-pylance</text>
  <text x="22" y="131" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">Ruff  charliermarsh.ruff</text>

  <!-- TOP-RIGHT: Notebook Layer (green) -->
  <rect x="588" y="58" width="202" height="90" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="588" y="58" width="202" height="28" rx="10" fill="#059669"/>
  <rect x="588" y="72" width="202" height="14" fill="#059669"/>
  <text x="689" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#FFFFFF">Notebook Layer</text>
  <text x="600" y="103" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">Jupyter  ms-toolsai.jupyter</text>
  <text x="600" y="117" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">Jupyter Keymap</text>
  <text x="600" y="131" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">ms-toolsai.jupyter-keymap</text>

  <!-- BOTTOM-LEFT: Git Layer (purple) -->
  <rect x="10" y="172" width="202" height="90" rx="10"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="10" y="172" width="202" height="28" rx="10" fill="#7C3AED"/>
  <rect x="10" y="186" width="202" height="14" fill="#7C3AED"/>
  <text x="111" y="190" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#FFFFFF">Git Layer</text>
  <text x="22" y="217" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">GitLens  eamodio.gitlens</text>
  <text x="22" y="231" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">GitHub Pull Requests</text>
  <text x="22" y="245" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#4C1D95">github.vscode-pull-request-github</text>

  <!-- BOTTOM-RIGHT: Quality of Life (amber) -->
  <rect x="588" y="172" width="202" height="90" rx="10"
        fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="588" y="172" width="202" height="28" rx="10" fill="#B45309"/>
  <rect x="588" y="186" width="202" height="14" fill="#B45309"/>
  <text x="689" y="190" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10.5" font-weight="700" fill="#FFFFFF">Quality of Life</text>
  <text x="600" y="217" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">indent-rainbow</text>
  <text x="600" y="231" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">YAML (Red Hat)</text>
  <text x="600" y="245" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E293B">Even Better TOML</text>

  <!-- BOTTOM RULE + note -->
  <line x1="10" y1="276" x2="790" y2="276" stroke="#E2E8F0" stroke-width="1"/>
  <text x="400" y="292" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#64748B">Install all at once: </text>
  <text x="400" y="307" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1">code --install-extension ms-python.python ms-python.vscode-pylance charliermarsh.ruff ms-toolsai.jupyter</text>
</svg>
