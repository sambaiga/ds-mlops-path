<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">pytest Test Execution Lifecycle</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Each test runs through the same five stages: setup, execute, assert, teardown, move on</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Stage 1: Discover test_*.py (gray) -->
  <rect x="14" y="72" width="116" height="70" rx="10"
        fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="14" y="72" width="116" height="24" rx="10" fill="#64748B"/>
  <rect x="14" y="82" width="116" height="14" fill="#64748B"/>
  <text x="72" y="87" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">1. Discover</text>
  <text x="72" y="110" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">find test_*.py</text>
  <text x="72" y="123" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">and test_* funcs</text>
  <text x="72" y="136" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">auto, no config</text>

  <line x1="130" y1="107" x2="144" y2="107" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Fixture setup (blue) -->
  <rect x="148" y="72" width="116" height="70" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="148" y="72" width="116" height="24" rx="10" fill="#0369A1"/>
  <rect x="148" y="82" width="116" height="14" fill="#0369A1"/>
  <text x="206" y="87" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">2. Setup</text>
  <text x="206" y="110" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">@pytest.fixture</text>
  <text x="206" y="123" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">runs before test</text>
  <text x="206" y="136" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">inject resources</text>

  <line x1="264" y1="107" x2="278" y2="107" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Execute test body (blue) -->
  <rect x="282" y="72" width="116" height="70" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="282" y="72" width="116" height="24" rx="10" fill="#0369A1"/>
  <rect x="282" y="82" width="116" height="14" fill="#0369A1"/>
  <text x="340" y="87" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">3. Execute</text>
  <text x="340" y="110" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">test body runs</text>
  <text x="340" y="123" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">calls function</text>
  <text x="340" y="136" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">under test</text>

  <line x1="398" y1="107" x2="412" y2="107" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: assert? diamond -->
  <polygon points="450,93 486,107 450,121 414,107" fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="450" y="104" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" font-weight="700" fill="#92400E">assert</text>
  <text x="450" y="115" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8" font-weight="700" fill="#92400E">passes?</text>

  <!-- YES path: PASSED (green) -->
  <line x1="486" y1="107" x2="530" y2="107" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="508" y="101" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#059669">Yes</text>
  <rect x="534" y="87" width="80" height="40" rx="8"
        fill="#F0FDF4" stroke="#059669" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="574" y="107" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#059669">PASSED</text>

  <!-- NO path: FAILED (red) -->
  <line x1="450" y1="121" x2="450" y2="163" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="462" y="136" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#DC2626">No</text>
  <rect x="406" y="166" width="88" height="40" rx="8"
        fill="#FEF2F2" stroke="#DC2626" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="450" y="183" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#DC2626">FAILED</text>
  <text x="450" y="197" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#475569">full traceback shown</text>

  <!-- Stage 5: Teardown (gray) -->
  <line x1="614" y1="107" x2="628" y2="107" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="632" y="72" width="116" height="70" rx="10"
        fill="#F8FAFC" stroke="#64748B" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <rect x="632" y="72" width="116" height="24" rx="10" fill="#64748B"/>
  <rect x="632" y="82" width="116" height="14" fill="#64748B"/>
  <text x="690" y="87" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">4. Teardown</text>
  <text x="690" y="110" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">yield fixtures</text>
  <text x="690" y="123" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#475569">cleanup runs</text>
  <text x="690" y="136" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">after yield body</text>

  <!-- Loop back arrow: teardown to next test (from box edge back over top) -->
  <path d="M690,72 Q690,58 340,58 Q120,58 72,72"
        stroke="#64748B" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="400" y="55" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">next test</text>
</svg>
