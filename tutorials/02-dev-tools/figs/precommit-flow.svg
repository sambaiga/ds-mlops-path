<svg width="800" height="260" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748B"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0369A1"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#B45309"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#DC2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">pre-commit: Automated Quality Gates Before Every Commit</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Hooks run automatically on git commit; no more CI failures for forgotten formatting</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Step 1: git commit (blue) -->
  <rect x="14" y="88" width="130" height="52" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="2" filter="url(#panel-shadow)"/>
  <rect x="14" y="88" width="130" height="24" rx="10" fill="#0369A1"/>
  <rect x="14" y="100" width="130" height="12" fill="#0369A1"/>
  <text x="79" y="103" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">1. git commit</text>
  <text x="79" y="121" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">git commit -m "..."</text>
  <text x="79" y="133" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">triggers .git/hooks/pre-commit</text>

  <line x1="144" y1="114" x2="158" y2="114" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: pre-commit hooks run (blue) -->
  <rect x="162" y="88" width="130" height="52" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="2" filter="url(#panel-shadow)"/>
  <rect x="162" y="88" width="130" height="24" rx="10" fill="#0369A1"/>
  <rect x="162" y="100" width="130" height="12" fill="#0369A1"/>
  <text x="227" y="103" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#FFFFFF">2. Hooks Run</text>
  <text x="227" y="121" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E40AF">pre-commit</text>
  <text x="227" y="133" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">reads .pre-commit-config.yaml</text>

  <line x1="292" y1="114" x2="306" y2="114" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: ruff check diamond -->
  <polygon points="352,98 394,114 352,130 310,114" fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="352" y="111" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="7.5" font-weight="700" fill="#0369A1">ruff</text>
  <text x="352" y="122" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="7.5" font-weight="700" fill="#0369A1">check</text>

  <!-- ruff: auto-fixed path (down) -->
  <line x1="352" y1="130" x2="352" y2="175" stroke="#B45309" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="364" y="148" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#B45309">auto-fixed</text>

  <!-- ruff fix box -->
  <rect x="296" y="176" width="112" height="46" rx="8"
        fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="352" y="193" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8.5" font-weight="700" fill="#92400E">file changed</text>
  <text x="352" y="206" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">git add + retry</text>
  <text x="352" y="218" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">loops back to step 2</text>

  <!-- Loop back arrow from fix box to hooks run -->
  <path d="M296,199 Q240,199 227,140"
        stroke="#B45309" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>

  <!-- ruff: no findings path (right) -->
  <line x1="394" y1="114" x2="420" y2="114" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="406" y="107" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#059669">no findings</text>

  <!-- Step 4: commitizen diamond -->
  <polygon points="468,98 514,114 468,130 422,114" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="468" y="108" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="7" font-weight="700" fill="#7C3AED">cz check</text>
  <text x="468" y="119" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="7" font-weight="700" fill="#7C3AED">-msg</text>

  <!-- commitizen: invalid format (down) - BLOCKED -->
  <line x1="468" y1="130" x2="468" y2="175" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="482" y="148" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#DC2626">invalid</text>

  <rect x="408" y="176" width="120" height="46" rx="8"
        fill="#FEF2F2" stroke="#DC2626" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="468" y="196" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#DC2626">BLOCKED</text>
  <text x="468" y="210" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">fix your commit message</text>
  <text x="468" y="222" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#94A3B8">e.g. feat: add ridge model</text>

  <!-- commitizen: valid format (right) - sealed -->
  <line x1="514" y1="114" x2="540" y2="114" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="526" y="107" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#059669">valid</text>

  <!-- Final: commit sealed (green) -->
  <rect x="544" y="88" width="242" height="52" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="2.5" filter="url(#panel-shadow)"/>
  <rect x="544" y="88" width="242" height="24" rx="10" fill="#059669"/>
  <rect x="544" y="100" width="242" height="12" fill="#059669"/>
  <text x="665" y="103" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">Commit Sealed</text>
  <text x="665" y="122" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#065F46">clean code + valid message</text>
  <text x="665" y="133" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#94A3B8">pushed to history with confidence</text>
</svg>
