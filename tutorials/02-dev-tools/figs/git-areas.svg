<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow-fwd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1E293B"/>
    </marker>
    <marker id="arrow-bwd" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#1E293B"/>
    </marker>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Git Three-Zone Model</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Every change lives in exactly one zone before it becomes history</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Zone 1: Working Tree (purple, dashed border) -->
  <rect x="14" y="60" width="222" height="140" rx="10"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" stroke-dasharray="7,4" filter="url(#panel-shadow)"/>
  <rect x="14" y="60" width="222" height="32" rx="10" fill="#7C3AED"/>
  <rect x="14" y="78" width="222" height="14" fill="#7C3AED"/>
  <text x="125" y="81" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Working Tree</text>
  <text x="125" y="110" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#4C1D95">files on disk</text>
  <text x="125" y="124" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#475569">your current edits</text>
  <text x="125" y="144" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">untracked / modified /</text>
  <text x="125" y="156" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">deleted files live here</text>
  <text x="125" y="186" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#7C3AED" font-style="italic">git status shows this zone</text>

  <!-- Zone 2: Staging Area (blue) -->
  <rect x="289" y="60" width="222" height="140" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="2" filter="url(#panel-shadow)"/>
  <rect x="289" y="60" width="222" height="32" rx="10" fill="#0369A1"/>
  <rect x="289" y="78" width="222" height="14" fill="#0369A1"/>
  <text x="400" y="81" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Staging Area / Index</text>
  <text x="400" y="110" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E40AF">snapshot of what will</text>
  <text x="400" y="124" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E40AF">be committed</text>
  <text x="400" y="144" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">choose exactly which</text>
  <text x="400" y="156" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">changes go into next commit</text>
  <text x="400" y="186" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#0369A1" font-style="italic">git diff --staged shows this zone</text>

  <!-- Zone 3: Commit History (green) -->
  <rect x="564" y="60" width="222" height="140" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="2" filter="url(#panel-shadow)"/>
  <rect x="564" y="60" width="222" height="32" rx="10" fill="#059669"/>
  <rect x="564" y="78" width="222" height="14" fill="#059669"/>
  <text x="675" y="81" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Commit History</text>
  <text x="675" y="110" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">permanent,</text>
  <text x="675" y="124" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">content-addressed objects</text>
  <text x="675" y="144" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">SHA hash identifies</text>
  <text x="675" y="156" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#94A3B8">every commit uniquely</text>
  <text x="675" y="186" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#059669" font-style="italic">git log shows this zone</text>

  <!-- Arrow: Working Tree to Staging (forward, above) -->
  <line x1="236" y1="108" x2="289" y2="108" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>
  <text x="262" y="102" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#1E293B" font-weight="600">git add file</text>

  <!-- Arrow: Staging to Working Tree (backward, below) -->
  <line x1="289" y1="128" x2="236" y2="128" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrow-bwd)"/>
  <text x="262" y="143" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#64748B">git restore --staged file</text>

  <!-- Arrow: Staging to Commit (forward, above) -->
  <line x1="511" y1="108" x2="564" y2="108" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrow-fwd)"/>
  <text x="537" y="102" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#1E293B" font-weight="600">git commit</text>

  <!-- Arrow: Commit to Working Tree (backward, below) -->
  <line x1="564" y1="128" x2="511" y2="128" stroke="#1E293B" stroke-width="1.5" marker-end="url(#arrow-bwd)"/>
  <text x="537" y="143" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#64748B">git restore file</text>
</svg>
