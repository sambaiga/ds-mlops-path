<svg width="800" height="260" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- TITLE BLOCK -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Feature Branch Workflow</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Work on a branch, merge when the experiment succeeds</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Background panel -->
  <rect x="14" y="58" width="772" height="182" rx="10"
        fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" filter="url(#panel-shadow)"/>

  <!-- Branch labels (left side) -->
  <text x="30" y="118" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#0369A1">main</text>
  <text x="30" y="178" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#7C3AED">experiment/ridge</text>

  <!-- Main branch line -->
  <line x1="90" y1="113" x2="740" y2="113" stroke="#0369A1" stroke-width="3"/>

  <!-- Feature branch line: forks from commit 1 (~x=200), rejoins at commit 2 merge (~x=540) -->
  <path d="M200,113 Q240,113 260,158 L460,158 Q480,158 520,113"
        stroke="#7C3AED" stroke-width="2.5" fill="none" stroke-dasharray="6,3"/>

  <!-- Main branch commits -->
  <!-- Commit M1: "feat: initial setup" at x=200 -->
  <circle cx="200" cy="113" r="12" fill="#0369A1" stroke="#FFFFFF" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="200" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E293B">feat: initial setup</text>
  <line x1="200" y1="100" x2="200" y2="101" stroke="#0369A1" stroke-width="1"/>

  <!-- Commit M2 (merge): "merge: ridge (RMSE=9.2)" at x=540 -->
  <circle cx="540" cy="113" r="12" fill="#059669" stroke="#FFFFFF" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="540" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E293B">merge: ridge (RMSE=9.2)</text>
  <line x1="540" y1="100" x2="540" y2="101" stroke="#059669" stroke-width="1"/>

  <!-- Commit M3: "chore: update deps" at x=680 -->
  <circle cx="680" cy="113" r="12" fill="#0369A1" stroke="#FFFFFF" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="680" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E293B">chore: update deps</text>
  <line x1="680" y1="100" x2="680" y2="101" stroke="#0369A1" stroke-width="1"/>

  <!-- Feature branch commits -->
  <!-- Commit F1: "feat: ridge baseline" at x=300 -->
  <circle cx="300" cy="158" r="10" fill="#7C3AED" stroke="#FFFFFF" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="300" y="180" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E293B">feat: ridge baseline</text>

  <!-- Commit F2: "test: parametrize" at x=430 -->
  <circle cx="430" cy="158" r="10" fill="#7C3AED" stroke="#FFFFFF" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="430" y="180" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#1E293B">test: parametrize</text>

  <!-- Merge arrow from feature end to merge commit -->
  <line x1="520" y1="113" x2="540" y2="113" stroke="#059669" stroke-width="2"/>

  <!-- HEAD label -->
  <rect x="700" y="92" width="56" height="18" rx="4" fill="#1E293B"/>
  <text x="728" y="105" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">HEAD</text>
  <line x1="728" y1="110" x2="728" y2="113" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Branch fork indicator -->
  <line x1="200" y1="125" x2="200" y2="146" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="215" y="140" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#7C3AED">branch off</text>

  <!-- Legend -->
  <line x1="14" y1="242" x2="786" y2="242" stroke="#E2E8F0" stroke-width="1"/>
  <circle cx="120" cy="252" r="6" fill="#0369A1"/>
  <text x="132" y="256" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">main commit</text>
  <circle cx="220" cy="252" r="6" fill="#7C3AED"/>
  <text x="232" y="256" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">feature branch commit</text>
  <circle cx="380" cy="252" r="6" fill="#059669"/>
  <text x="392" y="256" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">merge commit</text>
  <line x1="490" y1="252" x2="520" y2="252" stroke="#7C3AED" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="528" y="256" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">feature branch (isolated)</text>
</svg>
