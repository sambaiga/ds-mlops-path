<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arr-inherit" markerWidth="9" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="9 0, 0 3.5, 9 7" fill="none" stroke="#0369A1" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">ABC Inheritance: Shared Interface, Different Implementations</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">The abstract base class enforces a contract; each subclass fills in the behaviour</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- TOP: BaseMetric(ABC) -->
  <rect x="230" y="58" width="340" height="88" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="2" filter="url(#panel-shadow)"/>
  <path d="M240,58 L560,58 Q570,58 570,68 L570,90 L230,90 L230,68 Q230,58 240,58 Z"
        fill="#0369A1"/>
  <text x="400" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">BaseMetric(ABC)</text>
  <text x="400" y="87" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#BFDBFE">abstract base class</text>
  <text x="400" y="108" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" fill="#1E3A5F">@abstractmethod</text>
  <text x="400" y="123" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" fill="#1E3A5F">compute(y_true, y_pred) -&gt; float</text>
  <rect x="250" y="130" width="300" height="14" rx="4" fill="#BFDBFE" opacity="0.5"/>
  <text x="400" y="141" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1" font-style="italic">cannot be instantiated directly</text>

  <!-- Inheritance lines -->
  <line x1="310" y1="148" x2="220" y2="195" stroke="#0369A1" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-inherit)"/>
  <line x1="490" y1="148" x2="580" y2="195" stroke="#0369A1" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-inherit)"/>

  <!-- Label on lines -->
  <text x="248" y="180" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">inherits</text>
  <text x="552" y="180" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#64748B">inherits</text>

  <!-- LEFT: AccuracyMetric -->
  <rect x="30" y="195" width="340" height="90" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M40,195 L360,195 Q370,195 370,205 L370,228 L30,228 L30,205 Q30,195 40,195 Z"
        fill="#059669"/>
  <text x="200" y="214" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">AccuracyMetric</text>
  <text x="200" y="226" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#D1FAE5">concrete subclass</text>
  <text x="200" y="247" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" fill="#065F46">def compute(y_true, y_pred):</text>
  <text x="200" y="262" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" fill="#065F46">    return (y_true == y_pred).mean()</text>
  <text x="200" y="277" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#059669" font-style="italic">fraction of correct predictions</text>

  <!-- RIGHT: F1Metric -->
  <rect x="430" y="195" width="340" height="90" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M440,195 L760,195 Q770,195 770,205 L770,228 L430,228 L430,205 Q430,195 440,195 Z"
        fill="#059669"/>
  <text x="600" y="214" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">F1Metric</text>
  <text x="600" y="226" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#D1FAE5">concrete subclass</text>
  <text x="600" y="247" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" fill="#065F46">def compute(y_true, y_pred):</text>
  <text x="600" y="262" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" fill="#065F46">    return f1_score(y_true, y_pred)</text>
  <text x="600" y="277" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#059669" font-style="italic">harmonic mean of precision and recall</text>

</svg>
