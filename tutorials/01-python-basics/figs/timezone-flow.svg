<svg width="800" height="240" viewBox="0 0 800 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="tz-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748B"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Timezone Handling: Localize Once, Store as UTC, Convert for Display</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Never mix naive and aware timestamps in the same column</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- STEP 1: Naive timestamp -->
  <rect x="20" y="64" width="150" height="68" rx="10" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5" filter="url(#tz-shadow)" stroke-dasharray="6,3"/>
  <text x="95" y="84" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#64748B">tz-naive</text>
  <text x="95" y="100" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#475569">2025-01-15 09:00</text>
  <text x="95" y="115" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#94A3B8">(no timezone info)</text>
  <text x="95" y="130" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" font-weight="600" fill="#B45309">from CSV / string</text>

  <!-- Arrow 1: localize -->
  <line x1="172" y1="98" x2="222" y2="98" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="197" y="92" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">tz_localize(</text>
  <text x="197" y="104" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">'US/Eastern')</text>

  <!-- STEP 2: Aware timestamp -->
  <rect x="224" y="64" width="155" height="68" rx="10" fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#tz-shadow)"/>
  <text x="301" y="84" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#0369A1">tz-aware</text>
  <text x="301" y="100" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">2025-01-15 09:00</text>
  <text x="301" y="115" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">-05:00 (EST)</text>
  <text x="301" y="130" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" font-weight="600" fill="#0369A1">knows its offset</text>

  <!-- Arrow 2: convert to UTC -->
  <line x1="381" y1="98" x2="431" y2="98" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="406" y="92" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">tz_convert(</text>
  <text x="406" y="104" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">'UTC')</text>

  <!-- STEP 3: UTC storage -->
  <rect x="433" y="64" width="155" height="68" rx="10" fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#tz-shadow)"/>
  <text x="510" y="84" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#059669">UTC (store this)</text>
  <text x="510" y="100" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">2025-01-15 14:00</text>
  <text x="510" y="115" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">+00:00</text>
  <text x="510" y="130" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" font-weight="600" fill="#059669">canonical form</text>

  <!-- Arrow 3: convert for display -->
  <line x1="590" y1="98" x2="640" y2="98" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="615" y="92" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">tz_convert(</text>
  <text x="615" y="104" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#475569">'Africa/DSM')</text>

  <!-- STEP 4: Local display -->
  <rect x="642" y="64" width="138" height="68" rx="10" fill="#FDF4FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#tz-shadow)"/>
  <text x="711" y="84" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#7C3AED">local display</text>
  <text x="711" y="100" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#3B0764">2025-01-15 17:00</text>
  <text x="711" y="115" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#3B0764">+03:00 (EAT)</text>
  <text x="711" y="130" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" font-weight="600" fill="#7C3AED">for output only</text>

  <!-- WARNING: Never mix naive and aware -->
  <rect x="20" y="158" width="350" height="58" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" filter="url(#tz-shadow)"/>
  <text x="195" y="178" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#DC2626">Common Mistake</text>
  <text x="195" y="195" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#991B1B">Mixing naive and tz-aware timestamps in one column</text>
  <text x="195" y="210" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#991B1B">raises TypeError -- localize ALL rows before any conversion</text>

  <!-- TIP box -->
  <rect x="390" y="158" width="390" height="58" rx="10" fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#tz-shadow)"/>
  <text x="585" y="178" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#059669">Rule of Thumb</text>
  <text x="585" y="195" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">Store everything in UTC; convert to local timezone at display time only</text>
  <text x="585" y="210" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">UTC comparisons are always correct; local times depend on DST rules</text>
</svg>
