<svg width="820" height="260" viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Jost', system-ui, sans-serif; }
      .code { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
      .label { font-size: 12px; fill: #374151; font-weight: 600; }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto">
      <path d="M1,1 L6,3.5 L1,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="820" height="260" rx="12" fill="#F8FAFC"/>

  <!-- Code line box -->
  <rect x="30" y="80" width="760" height="52" rx="8" fill="#1E293B"/>

  <!-- Highlighted spans inside code -->
  <!-- def -->
  <rect x="42"  y="86" width="34"  height="40" rx="4" fill="#7C3AED" opacity="0.7"/>
  <!-- function name -->
  <rect x="82"  y="86" width="136" height="40" rx="4" fill="#0369A1" opacity="0.7"/>
  <!-- param 1: midterm: float -->
  <rect x="222" y="86" width="108" height="40" rx="4" fill="#059669" opacity="0.7"/>
  <!-- param 2 + default: score: float = 0.0 -->
  <rect x="336" y="86" width="174" height="40" rx="4" fill="#D97706" opacity="0.6"/>
  <!-- return type -->
  <rect x="520" y="86" width="96"  height="40" rx="4" fill="#0891B2" opacity="0.7"/>

  <!-- Code text -->
  <text x="44"  y="113" class="code" font-size="17" fill="#F1F5F9">def</text>
  <text x="84"  y="113" class="code" font-size="17" fill="#F1F5F9">weighted_grade</text>
  <text x="218" y="113" class="code" font-size="17" fill="#CBD5E1">(</text>
  <text x="224" y="113" class="code" font-size="17" fill="#F1F5F9">midterm: float,</text>
  <text x="338" y="113" class="code" font-size="17" fill="#F1F5F9"> score: float = 0.0</text>
  <text x="512" y="113" class="code" font-size="17" fill="#CBD5E1">)</text>
  <text x="524" y="113" class="code" font-size="17" fill="#F1F5F9">-&gt; float</text>
  <text x="620" y="113" class="code" font-size="17" fill="#CBD5E1">:</text>

  <!-- Connector lines (up from code, down to labels) -->
  <!-- def -->
  <line x1="59"  y1="86"  x2="59"  y2="60"  stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="59"  y1="60"  x2="59"  y2="42"  stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- function name -->
  <line x1="150" y1="86"  x2="150" y2="42"  stroke="#0369A1" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <!-- param -->
  <line x1="276" y1="132" x2="276" y2="170" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <!-- default -->
  <line x1="423" y1="132" x2="423" y2="170" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <!-- return -->
  <line x1="568" y1="86"  x2="568" y2="42"  stroke="#0891B2" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- Labels top row -->
  <rect x="20"  y="18" width="80"  height="22" rx="4" fill="#7C3AED" opacity="0.15"/>
  <text x="60"  y="33" class="label" fill="#7C3AED" text-anchor="middle">keyword</text>

  <rect x="106" y="18" width="90"  height="22" rx="4" fill="#0369A1" opacity="0.15"/>
  <text x="151" y="33" class="label" fill="#0369A1" text-anchor="middle">function name</text>

  <rect x="514" y="18" width="110" height="22" rx="4" fill="#0891B2" opacity="0.15"/>
  <text x="569" y="33" class="label" fill="#0891B2" text-anchor="middle">return type</text>

  <!-- Labels bottom row -->
  <rect x="210" y="178" width="136" height="22" rx="4" fill="#059669" opacity="0.15"/>
  <text x="278" y="193" class="label" fill="#059669" text-anchor="middle">parameter + type hint</text>

  <rect x="354" y="178" width="138" height="22" rx="4" fill="#D97706" opacity="0.15"/>
  <text x="423" y="193" class="label" fill="#B45309" text-anchor="middle">parameter + default</text>

  <!-- Caption -->
  <text x="410" y="238" font-size="13" fill="#64748B" text-anchor="middle">
    Every part of a function signature is optional except <tspan font-family="monospace" fill="#374151">def</tspan>, the name, and the colon.
  </text>
</svg>
