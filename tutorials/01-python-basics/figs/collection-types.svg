<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Python Built-in Collection Types</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Two axes: whether order is preserved and whether items can change after creation</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Column headers -->
  <text x="210" y="66" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#64748B">Ordered</text>
  <text x="600" y="66" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#64748B">Unordered</text>

  <!-- Row headers -->
  <text x="22" y="142" text-anchor="middle" dominant-baseline="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#64748B"
        transform="rotate(-90, 22, 142)">Mutable</text>
  <text x="22" y="236" text-anchor="middle" dominant-baseline="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#64748B"
        transform="rotate(-90, 22, 236)">Immutable</text>

  <!-- TOP-LEFT: list (Ordered + Mutable, green) -->
  <rect x="40" y="72" width="345" height="100" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M50,72 L375,72 Q385,72 385,82 L385,105 L40,105 L40,82 Q40,72 50,72 Z"
        fill="#059669"/>
  <text x="212" y="88" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">list</text>
  <text x="212" y="101" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#D1FAE5">ordered  ·  mutable</text>
  <text x="212" y="122" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#065F46">Preserves insertion order.</text>
  <text x="212" y="136" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#065F46">Change, add, or remove any item.</text>
  <text x="212" y="155" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#059669">[1, "hello", 3.14]</text>

  <!-- TOP-RIGHT: tuple (Ordered + Immutable, blue) -->
  <rect x="415" y="72" width="345" height="100" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M425,72 L750,72 Q760,72 760,82 L760,105 L415,105 L415,82 Q415,72 425,72 Z"
        fill="#0369A1"/>
  <text x="587" y="88" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">tuple</text>
  <text x="587" y="101" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#BFDBFE">ordered  ·  immutable</text>
  <text x="587" y="122" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#1E3A5F">Preserves insertion order.</text>
  <text x="587" y="136" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#1E3A5F">Items are fixed after creation.</text>
  <text x="587" y="155" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#0369A1">(1, "hello", 3.14)</text>

  <!-- BOTTOM-LEFT: set (Unordered + Mutable, amber) -->
  <rect x="40" y="185" width="345" height="100" rx="10"
        fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M50,185 L375,185 Q385,185 385,195 L385,218 L40,218 L40,195 Q40,185 50,185 Z"
        fill="#B45309"/>
  <text x="212" y="201" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">set</text>
  <text x="212" y="214" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#FDE68A">unordered  ·  mutable</text>
  <text x="212" y="235" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#78350F">No duplicates allowed.</text>
  <text x="212" y="249" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#78350F">O(1) membership test with `in`.</text>
  <text x="212" y="268" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#B45309">{1, 2, 3}</text>

  <!-- BOTTOM-RIGHT: frozenset (Unordered + Immutable, purple) -->
  <rect x="415" y="185" width="345" height="100" rx="10"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M425,185 L750,185 Q760,185 760,195 L760,218 L415,218 L415,195 Q415,185 425,185 Z"
        fill="#7C3AED"/>
  <text x="587" y="201" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">frozenset</text>
  <text x="587" y="214" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#DDD6FE">unordered  ·  immutable</text>
  <text x="587" y="235" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#3B0764">Immutable set -- items cannot change.</text>
  <text x="587" y="249" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="10" fill="#3B0764">Hashable -- usable as a dict key.</text>
  <text x="587" y="268" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#7C3AED">frozenset({1, 2, 3})</text>

</svg>
