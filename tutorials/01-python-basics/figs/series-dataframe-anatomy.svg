<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arr-right" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#0369A1"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="700" fill="#1E293B">A Series Is One Labelled Column; a DataFrame Shares an Index Across Many</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">A DataFrame is a collection of Series objects aligned on a common index</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ======================== LEFT PANEL: Series ======================== -->
  <rect x="10" y="58" width="265" height="230" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M20,58 L265,58 Q275,58 275,68 L275,93 L10,93 L10,68 Q10,58 20,58 Z"
        fill="#0369A1"/>
  <text x="142" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Series</text>
  <text x="142" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#BFDBFE">one labelled column of values</text>

  <!-- Series name label -->
  <text x="142" y="110" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#0369A1">name: midterm_score</text>

  <!-- Table header -->
  <rect x="45" y="116" width="60" height="20" rx="3" fill="#DBEAFE"/>
  <text x="75" y="129" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="600" fill="#1E3A5F">index</text>
  <rect x="107" y="116" width="90" height="20" rx="3" fill="#0369A1"/>
  <text x="152" y="129" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">midterm_score</text>

  <!-- Row 0 -->
  <rect x="45" y="138" width="60" height="22" rx="0" fill="#EFF6FF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="75" y="152" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" fill="#64748B">0</text>
  <rect x="107" y="138" width="90" height="22" rx="0" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="152" y="152" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" fill="#1E293B">85</text>

  <!-- Row 1 -->
  <rect x="45" y="160" width="60" height="22" rx="0" fill="#EFF6FF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="75" y="174" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" fill="#64748B">1</text>
  <rect x="107" y="160" width="90" height="22" rx="0" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="152" y="174" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" fill="#1E293B">72</text>

  <!-- Row 2 -->
  <rect x="45" y="182" width="60" height="22" rx="0" fill="#EFF6FF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="75" y="196" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" fill="#64748B">2</text>
  <rect x="107" y="182" width="90" height="22" rx="0" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="152" y="196" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" fill="#1E293B">91</text>

  <!-- dtype label -->
  <text x="142" y="222" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#64748B">dtype: int64</text>
  <text x="142" y="237" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">s.name, s.index, s.values</text>
  <text x="142" y="255" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1" font-style="italic">s[0]  s.iloc[1]  s.mean()</text>
  <text x="142" y="274" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">length 3, one named column</text>

  <!-- ARROW between panels -->
  <line x1="285" y1="173" x2="325" y2="173" stroke="#0369A1" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="305" y="166" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#0369A1">many</text>
  <text x="305" y="177" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#0369A1">Series</text>

  <!-- ======================== RIGHT PANEL: DataFrame ======================== -->
  <rect x="330" y="58" width="460" height="230" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M340,58 L780,58 Q790,58 790,68 L790,93 L330,93 L330,68 Q330,58 340,58 Z"
        fill="#059669"/>
  <text x="560" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">DataFrame</text>
  <text x="560" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#D1FAE5">shared index + multiple named columns</text>

  <!-- DataFrame table header -->
  <rect x="345" y="100" width="44" height="20" rx="3" fill="#DCFCE7"/>
  <text x="367" y="113" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8.5" font-weight="600" fill="#065F46">index</text>

  <rect x="391" y="100" width="80" height="20" rx="3" fill="#059669"/>
  <text x="431" y="113" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">student_id</text>

  <rect x="473" y="100" width="60" height="20" rx="3" fill="#059669"/>
  <text x="503" y="113" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">midterm</text>

  <rect x="535" y="100" width="55" height="20" rx="3" fill="#059669"/>
  <text x="562" y="113" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">final</text>

  <rect x="592" y="100" width="70" height="20" rx="3" fill="#059669"/>
  <text x="627" y="113" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8.5" font-weight="700" fill="#FFFFFF">program</text>

  <!-- Row 0 -->
  <rect x="345" y="122" width="44" height="22" fill="#DCFCE7" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="367" y="136" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#065F46">0</text>
  <rect x="391" y="122" width="80" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="431" y="136" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">S001</text>
  <rect x="473" y="122" width="60" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="503" y="136" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">85</text>
  <rect x="535" y="122" width="55" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="562" y="136" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">88</text>
  <rect x="592" y="122" width="70" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="627" y="136" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">CS</text>

  <!-- Row 1 -->
  <rect x="345" y="144" width="44" height="22" fill="#DCFCE7" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="367" y="158" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#065F46">1</text>
  <rect x="391" y="144" width="80" height="22" fill="#F9FAFB" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="431" y="158" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">S002</text>
  <rect x="473" y="144" width="60" height="22" fill="#F9FAFB" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="503" y="158" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">72</text>
  <rect x="535" y="144" width="55" height="22" fill="#F9FAFB" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="562" y="158" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">76</text>
  <rect x="592" y="144" width="70" height="22" fill="#F9FAFB" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="627" y="158" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">Math</text>

  <!-- Row 2 -->
  <rect x="345" y="166" width="44" height="22" fill="#DCFCE7" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="367" y="180" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#065F46">2</text>
  <rect x="391" y="166" width="80" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="431" y="180" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">S003</text>
  <rect x="473" y="166" width="60" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="503" y="180" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">91</text>
  <rect x="535" y="166" width="55" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="562" y="180" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">94</text>
  <rect x="592" y="166" width="70" height="22" fill="white" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="627" y="180" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" fill="#1E293B">DS</text>

  <!-- Note about shared index -->
  <text x="475" y="213" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46" font-weight="600">Shared index aligns all columns automatically</text>
  <text x="475" y="228" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">df["midterm"]  returns a Series object</text>
  <text x="475" y="243" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">df.loc[0]  returns a row as a Series</text>
  <text x="475" y="258" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#059669" font-style="italic">shape: (3, 4)  -- 3 rows, 4 columns</text>
  <text x="475" y="275" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">dtypes: object, int64, int64, object</text>

</svg>
