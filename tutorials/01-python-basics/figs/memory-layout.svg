<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arr-ptr" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#EF4444"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#0369A1"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Python List vs NumPy Array: Memory Layout</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">NumPy stores values in a single contiguous block; Python lists store pointers</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- LEFT PANEL: Python list -->
  <rect x="10" y="58" width="375" height="230" rx="10"
        fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M20,58 L375,58 Q385,58 385,68 L385,94 L10,94 L10,68 Q10,58 20,58 Z"
        fill="#EF4444"/>
  <text x="197" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Python list</text>
  <text x="197" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#FECACA">array of PyObject* pointers -- heap scattered</text>

  <!-- list object box -->
  <rect x="30" y="105" width="100" height="22" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="80" y="119" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#7F1D1D">list object</text>

  <!-- pointer row -->
  <rect x="30" y="135" width="36" height="22" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="48" y="149" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">ptr[0]</text>
  <rect x="72" y="135" width="36" height="22" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="90" y="149" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">ptr[1]</text>
  <rect x="114" y="135" width="36" height="22" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="132" y="149" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">ptr[2]</text>
  <rect x="156" y="135" width="36" height="22" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="174" y="149" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">ptr[3]</text>

  <!-- PyObject boxes scattered -->
  <rect x="30" y="190" width="52" height="32" rx="4" fill="#FECACA" stroke="#EF4444" stroke-width="1"/>
  <text x="56" y="204" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">PyObject</text>
  <text x="56" y="216" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">1.0</text>

  <rect x="130" y="175" width="52" height="32" rx="4" fill="#FECACA" stroke="#EF4444" stroke-width="1"/>
  <text x="156" y="189" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">PyObject</text>
  <text x="156" y="201" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">2.0</text>

  <rect x="240" y="195" width="52" height="32" rx="4" fill="#FECACA" stroke="#EF4444" stroke-width="1"/>
  <text x="266" y="209" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">PyObject</text>
  <text x="266" y="221" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">3.0</text>

  <rect x="310" y="178" width="52" height="32" rx="4" fill="#FECACA" stroke="#EF4444" stroke-width="1"/>
  <text x="336" y="192" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">PyObject</text>
  <text x="336" y="204" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8" fill="#7F1D1D">4.0</text>

  <!-- Pointer arrows -->
  <line x1="48" y1="157" x2="48" y2="188" stroke="#EF4444" stroke-width="1" marker-end="url(#arr-ptr)"/>
  <line x1="90" y1="157" x2="150" y2="173" stroke="#EF4444" stroke-width="1" marker-end="url(#arr-ptr)"/>
  <line x1="132" y1="157" x2="262" y2="193" stroke="#EF4444" stroke-width="1" marker-end="url(#arr-ptr)"/>
  <line x1="174" y1="157" x2="330" y2="176" stroke="#EF4444" stroke-width="1" marker-end="url(#arr-ptr)"/>

  <text x="197" y="256" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#DC2626" font-weight="600">Each element = separate heap allocation</text>
  <text x="197" y="270" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">type check + pointer chase on every access</text>

  <!-- RIGHT PANEL: NumPy array -->
  <rect x="415" y="58" width="375" height="230" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M425,58 L780,58 Q790,58 790,68 L790,94 L415,94 L415,68 Q415,58 425,58 Z"
        fill="#0369A1"/>
  <text x="602" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">NumPy ndarray</text>
  <text x="602" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#BFDBFE">contiguous block of typed values -- cache friendly</text>

  <!-- ndarray metadata box -->
  <rect x="435" y="105" width="120" height="38" rx="4" fill="#DBEAFE" stroke="#0369A1" stroke-width="1"/>
  <text x="495" y="120" text-anchor="middle" font-family="'Jost',sans-serif" font-size="8.5" fill="#1E3A5F">ndarray metadata</text>
  <text x="495" y="134" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#1E3A5F">dtype=float64  shape=(4,)</text>

  <!-- Arrow from metadata to data block -->
  <line x1="555" y1="124" x2="590" y2="124" stroke="#0369A1" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="572" y="118" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#64748B">data ptr</text>

  <!-- Contiguous data block -->
  <rect x="595" y="108" width="60" height="30" rx="3" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <text x="625" y="127" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#1E3A5F">1.0</text>
  <rect x="655" y="108" width="60" height="30" rx="3" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <text x="685" y="127" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#1E3A5F">2.0</text>
  <rect x="595" y="140" width="60" height="30" rx="3" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <text x="625" y="159" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#1E3A5F">3.0</text>
  <rect x="655" y="140" width="60" height="30" rx="3" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <text x="685" y="159" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#1E3A5F">4.0</text>

  <!-- Brace label -->
  <rect x="595" y="176" width="120" height="16" rx="3" fill="#0369A1" opacity="0.12"/>
  <text x="655" y="187" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#0369A1" font-weight="600">one cache line</text>

  <!-- float64 label -->
  <text x="435" y="210" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">Each cell: 8 bytes (float64)</text>
  <text x="435" y="224" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">No type object overhead per element</text>

  <text x="602" y="256" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1" font-weight="600">Vectorised operations use SIMD/BLAS</text>
  <text x="602" y="270" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">10-100x faster than Python loops on arrays</text>

</svg>
