<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arr-label" markerWidth="7" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="7 0, 0 3, 7 6" fill="#64748B"/>
    </marker>
    <marker id="arr-label-r" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">matplotlib Object Model: Figure Contains One or More Axes</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">The Figure is the canvas; each Axes is an independent plot area with its own coordinate system</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Figure outer rectangle -->
  <rect x="120" y="58" width="490" height="255" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="2" filter="url(#panel-shadow)"/>
  <text x="365" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0369A1">Figure  (the canvas)</text>
  <text x="365" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">fig = plt.figure()  or  fig, ax = plt.subplots()</text>

  <!-- Axes inner rectangle -->
  <rect x="165" y="97" width="375" height="200" rx="8"
        fill="#F8FAFC" stroke="#64748B" stroke-width="1.5"/>

  <!-- Axes title at top of plot area -->
  <text x="352" y="113" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151" font-style="italic">ax.set_title("Monthly Revenue")</text>

  <!-- Fake bar chart data -->
  <!-- Bars: 5 bars at bottom of axes area -->
  <!-- axes inner area: x=165 to 540, y=97 to 297; plot area starts ~y=120 ends y=275 -->
  <rect x="188" y="214" width="30" height="55" rx="2" fill="#0369A1" opacity="0.75"/>
  <rect x="232" y="198" width="30" height="71" rx="2" fill="#0369A1" opacity="0.75"/>
  <rect x="276" y="175" width="30" height="94" rx="2" fill="#059669" opacity="0.75"/>
  <rect x="320" y="190" width="30" height="79" rx="2" fill="#059669" opacity="0.75"/>
  <rect x="364" y="160" width="30" height="109" rx="2" fill="#0369A1" opacity="0.75"/>
  <rect x="408" y="180" width="30" height="89" rx="2" fill="#059669" opacity="0.75"/>
  <rect x="452" y="170" width="30" height="99" rx="2" fill="#0369A1" opacity="0.75"/>
  <rect x="496" y="149" width="30" height="120" rx="2" fill="#059669" opacity="0.75"/>

  <!-- x-axis line -->
  <line x1="178" y1="269" x2="535" y2="269" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- y-axis line -->
  <line x1="178" y1="120" x2="178" y2="269" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Tick marks on x-axis -->
  <line x1="203" y1="269" x2="203" y2="275" stroke="#94A3B8" stroke-width="1"/>
  <line x1="247" y1="269" x2="247" y2="275" stroke="#94A3B8" stroke-width="1"/>
  <line x1="291" y1="269" x2="291" y2="275" stroke="#94A3B8" stroke-width="1"/>
  <line x1="335" y1="269" x2="335" y2="275" stroke="#94A3B8" stroke-width="1"/>
  <line x1="379" y1="269" x2="379" y2="275" stroke="#94A3B8" stroke-width="1"/>
  <line x1="423" y1="269" x2="423" y2="275" stroke="#94A3B8" stroke-width="1"/>
  <line x1="467" y1="269" x2="467" y2="275" stroke="#94A3B8" stroke-width="1"/>
  <line x1="511" y1="269" x2="511" y2="275" stroke="#94A3B8" stroke-width="1"/>

  <!-- Tick marks on y-axis -->
  <line x1="172" y1="149" x2="178" y2="149" stroke="#94A3B8" stroke-width="1"/>
  <line x1="172" y1="189" x2="178" y2="189" stroke="#94A3B8" stroke-width="1"/>
  <line x1="172" y1="229" x2="178" y2="229" stroke="#94A3B8" stroke-width="1"/>

  <!-- Legend box inside axes -->
  <rect x="465" y="103" width="65" height="36" rx="4" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="470" y="112" width="10" height="8" rx="1" fill="#0369A1" opacity="0.75"/>
  <text x="483" y="120" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#374151">Series A</text>
  <rect x="470" y="124" width="10" height="8" rx="1" fill="#059669" opacity="0.75"/>
  <text x="483" y="132" font-family="'Libre Franklin',sans-serif" font-size="7.5" fill="#374151">Series B</text>

  <!-- X-axis label -->
  <text x="355" y="291" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151" font-style="italic">ax.set_xlabel("Month")</text>

  <!-- Axes label -->
  <text x="152" y="197" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#374151" font-style="italic"
        transform="rotate(-90, 152, 197)">ax.set_ylabel("Revenue")</text>

  <!-- - Annotation callouts (right side) - -->
  <!-- Figure label callout -->
  <line x1="610" y1="90" x2="660" y2="90" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="662" y="80" width="126" height="20" rx="4" fill="#EFF6FF" stroke="#0369A1" stroke-width="1"/>
  <text x="724" y="93" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1">fig.set_size_inches()</text>

  <!-- Axes label callout -->
  <line x1="540" y1="115" x2="660" y2="115" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="662" y="105" width="126" height="20" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="1"/>
  <text x="724" y="118" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">Axes object = ax</text>

  <!-- Legend callout -->
  <line x1="530" y1="121" x2="660" y2="138" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="662" y="130" width="126" height="20" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="1"/>
  <text x="724" y="143" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">ax.legend()</text>

  <!-- Spine callout -->
  <line x1="165" y1="150" x2="80" y2="150" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="14" y="141" width="64" height="20" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="1"/>
  <text x="46" y="154" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">ax.spines</text>

  <!-- Ticks callout -->
  <line x1="178" y1="275" x2="80" y2="295" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="10" y="286" width="68" height="20" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="1"/>
  <text x="44" y="299" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">ax.tick_params</text>

  <!-- Title callout -->
  <line x1="460" y1="112" x2="660" y2="162" stroke="#64748B" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="662" y="154" width="126" height="20" rx="4" fill="#F8FAFC" stroke="#64748B" stroke-width="1"/>
  <text x="724" y="167" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">ax.set_title()</text>

</svg>
