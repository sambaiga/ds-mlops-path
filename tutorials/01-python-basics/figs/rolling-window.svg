<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arr-result" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">rolling(n=3).mean() -- Window Slides One Step at a Time</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Each output value is the mean of the n most recent observations</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ====== Top row: 5 data boxes ====== -->
  <!-- Box positions: day1=80, day2=200, day3=320, day4=440, day5=560 (each 100px wide, gap 20px) -->
  <!-- Adjusted: x: 60,182,304,426,548 width=100 -->

  <!-- Day 1 -->
  <rect x="60" y="60" width="100" height="50" rx="8"
        fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="110" y="80" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#64748B">day 1</text>
  <text x="110" y="100" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="18" font-weight="700" fill="#1E293B">70</text>

  <!-- Day 2 -->
  <rect x="182" y="60" width="100" height="50" rx="8"
        fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="232" y="80" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#64748B">day 2</text>
  <text x="232" y="100" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="18" font-weight="700" fill="#1E293B">80</text>

  <!-- Day 3 -->
  <rect x="304" y="60" width="100" height="50" rx="8"
        fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="354" y="80" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#64748B">day 3</text>
  <text x="354" y="100" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="18" font-weight="700" fill="#1E293B">90</text>

  <!-- Day 4 -->
  <rect x="426" y="60" width="100" height="50" rx="8"
        fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="476" y="80" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#64748B">day 4</text>
  <text x="476" y="100" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="18" font-weight="700" fill="#1E293B">60</text>

  <!-- Day 5 -->
  <rect x="548" y="60" width="100" height="50" rx="8"
        fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="598" y="80" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#64748B">day 5</text>
  <text x="598" y="100" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="18" font-weight="700" fill="#1E293B">75</text>

  <!-- ====== Window 1: days 1-3 (green) ====== -->
  <!-- Bracket spanning x=60 to x=404 (day1 to day3+100) -->
  <rect x="58" y="118" width="348" height="4" rx="2" fill="#059669" opacity="0.8"/>
  <line x1="60" y1="118" x2="60" y2="130" stroke="#059669" stroke-width="2"/>
  <line x1="404" y1="118" x2="404" y2="130" stroke="#059669" stroke-width="2"/>
  <text x="231" y="142" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#059669">window 1  (days 1-3)</text>

  <!-- Arrow to result 1 -->
  <line x1="405" y1="132" x2="438" y2="150" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-result)"/>

  <!-- Result box 1 -->
  <rect x="440" y="148" width="120" height="28" rx="6" fill="#DCFCE7" stroke="#059669" stroke-width="1.5"/>
  <text x="500" y="161" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#065F46">mean = 80.0</text>
  <text x="500" y="171" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#059669">(70+80+90) / 3</text>

  <!-- ====== Window 2: days 2-4 (blue) ====== -->
  <rect x="180" y="155" width="348" height="4" rx="2" fill="#0369A1" opacity="0.8"/>
  <line x1="182" y1="155" x2="182" y2="167" stroke="#0369A1" stroke-width="2"/>
  <line x1="526" y1="155" x2="526" y2="167" stroke="#0369A1" stroke-width="2"/>
  <text x="354" y="179" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#0369A1">window 2  (days 2-4)</text>

  <!-- Arrow to result 2 -->
  <line x1="530" y1="168" x2="570" y2="155" stroke="#0369A1" stroke-width="1.5" marker-end="url(#arr-result)"/>

  <!-- Result box 2 -->
  <rect x="573" y="142" width="120" height="28" rx="6" fill="#DBEAFE" stroke="#0369A1" stroke-width="1.5"/>
  <text x="633" y="155" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#1E3A5F">mean = 76.7</text>
  <text x="633" y="165" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#0369A1">(80+90+60) / 3</text>

  <!-- ====== Window 3: days 3-5 (purple) ====== -->
  <rect x="302" y="192" width="348" height="4" rx="2" fill="#7C3AED" opacity="0.8"/>
  <line x1="304" y1="192" x2="304" y2="204" stroke="#7C3AED" stroke-width="2"/>
  <line x1="648" y1="192" x2="648" y2="204" stroke="#7C3AED" stroke-width="2"/>
  <text x="476" y="216" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="600" fill="#7C3AED">window 3  (days 3-5)</text>

  <!-- Arrow to result 3 -->
  <line x1="650" y1="204" x2="680" y2="216" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-result)"/>

  <!-- Result box 3 -->
  <rect x="682" y="213" width="108" height="28" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="736" y="226" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#3B0764">mean = 75.0</text>
  <text x="736" y="236" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8" fill="#7C3AED">(90+60+75) / 3</text>

  <!-- NaN note -->
  <rect x="30" y="252" width="740" height="34" rx="6" fill="#FFFBEB" stroke="#B45309" stroke-width="1"/>
  <text x="400" y="266" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#78350F" font-weight="600">First 2 results are NaN -- window not yet full at days 1 and 2</text>
  <text x="400" y="280" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#92400E">Use min_periods=1 to compute partial means instead  |  Default: min_periods = window size</text>

</svg>
