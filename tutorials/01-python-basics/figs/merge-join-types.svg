<svg width="800" height="350" viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="join-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Four Join Types: Which Rows Survive pd.merge</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">how= controls which rows are kept when a key has no match on the other side</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Column headers: Left Table, key icons, Right Table -->
  <text x="70" y="68" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#64748B">Left</text>
  <text x="140" y="68" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#64748B">Right</text>
  <text x="230" y="68" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#64748B">how=</text>
  <text x="500" y="68" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#64748B">Result rows</text>
  <text x="690" y="68" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#64748B">Rule</text>

  <!-- INNER JOIN row -->
  <rect x="10" y="76" width="780" height="58" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.2" filter="url(#join-shadow)"/>
  <!-- Left circles -->
  <circle cx="55" cy="105" r="22" fill="#BBF7D0" stroke="#059669" stroke-width="1.5" opacity="0.9"/>
  <circle cx="85" cy="105" r="22" fill="#BBF7D0" stroke="#059669" stroke-width="1.5" opacity="0.9"/>
  <!-- Overlap region (inner) -->
  <ellipse cx="70" cy="105" rx="12" ry="18" fill="#059669" opacity="0.3"/>
  <text x="70" y="109" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#065F46" font-weight="700">both</text>
  <text x="230" y="109" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#065F46">"inner"</text>
  <!-- Result boxes: only matched rows -->
  <rect x="310" y="87" width="50" height="18" rx="3" fill="#059669" opacity="0.7"/>
  <text x="335" y="100" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S001</text>
  <rect x="366" y="87" width="50" height="18" rx="3" fill="#059669" opacity="0.7"/>
  <text x="391" y="100" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S002</text>
  <text x="500" y="100" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#065F46">Rows with a match on both sides only</text>
  <text x="500" y="116" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Unmatched rows from either table are dropped</text>
  <rect x="630" y="89" width="44" height="18" rx="4" fill="#059669" opacity="0.15" stroke="#059669" stroke-width="1"/>
  <text x="652" y="102" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#065F46">INNER</text>

  <!-- LEFT JOIN row -->
  <rect x="10" y="140" width="780" height="58" rx="8" fill="#EFF6FF" stroke="#0369A1" stroke-width="1.2" filter="url(#join-shadow)"/>
  <circle cx="55" cy="169" r="22" fill="#BFDBFE" stroke="#0369A1" stroke-width="1.5"/>
  <circle cx="85" cy="169" r="22" fill="#E0EDFF" stroke="#0369A1" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="68" cy="169" rx="18" ry="18" fill="#0369A1" opacity="0.2"/>
  <text x="52" y="173" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#1E3A5F" font-weight="700">all</text>
  <text x="230" y="173" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#0C4A6E">"left"</text>
  <rect x="310" y="151" width="50" height="18" rx="3" fill="#0369A1" opacity="0.7"/>
  <text x="335" y="164" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S001</text>
  <rect x="366" y="151" width="50" height="18" rx="3" fill="#0369A1" opacity="0.7"/>
  <text x="391" y="164" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S002</text>
  <rect x="422" y="151" width="50" height="18" rx="3" fill="#0369A1" opacity="0.4"/>
  <text x="447" y="164" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S003+NaN</text>
  <text x="560" y="164" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#0C4A6E">All left rows; right side is NaN where no match</text>
  <text x="560" y="180" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Most common default; avoids losing data from the primary table</text>
  <rect x="630" y="153" width="40" height="18" rx="4" fill="#0369A1" opacity="0.15" stroke="#0369A1" stroke-width="1"/>
  <text x="650" y="166" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#0C4A6E">LEFT</text>

  <!-- RIGHT JOIN row -->
  <rect x="10" y="204" width="780" height="58" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.2" filter="url(#join-shadow)"/>
  <circle cx="55" cy="233" r="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
  <circle cx="85" cy="233" r="22" fill="#DDD6FE" stroke="#7C3AED" stroke-width="1.5"/>
  <ellipse cx="72" cy="233" rx="18" ry="18" fill="#7C3AED" opacity="0.2"/>
  <text x="88" y="237" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#3B0764" font-weight="700">all</text>
  <text x="230" y="237" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#3B0764">"right"</text>
  <rect x="310" y="215" width="50" height="18" rx="3" fill="#7C3AED" opacity="0.7"/>
  <text x="335" y="228" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S001</text>
  <rect x="366" y="215" width="50" height="18" rx="3" fill="#7C3AED" opacity="0.7"/>
  <text x="391" y="228" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S002</text>
  <rect x="422" y="215" width="55" height="18" rx="3" fill="#7C3AED" opacity="0.4"/>
  <text x="449" y="228" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">NaN+S004</text>
  <text x="560" y="228" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#3B0764">All right rows; left side is NaN where no match</text>
  <text x="560" y="244" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Mirror image of left; less common in practice</text>
  <rect x="628" y="217" width="44" height="18" rx="4" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="1"/>
  <text x="650" y="230" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#3B0764">RIGHT</text>

  <!-- OUTER JOIN row -->
  <rect x="10" y="268" width="780" height="58" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2" filter="url(#join-shadow)"/>
  <circle cx="55" cy="297" r="22" fill="#FECACA" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="85" cy="297" r="22" fill="#FECACA" stroke="#DC2626" stroke-width="1.5"/>
  <text x="40" y="301" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#991B1B" font-weight="700">all</text>
  <text x="100" y="301" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="8" fill="#991B1B" font-weight="700">all</text>
  <text x="230" y="301" text-anchor="middle" font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#991B1B">"outer"</text>
  <rect x="310" y="279" width="50" height="18" rx="3" fill="#DC2626" opacity="0.6"/>
  <text x="335" y="292" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S001</text>
  <rect x="366" y="279" width="50" height="18" rx="3" fill="#DC2626" opacity="0.6"/>
  <text x="391" y="292" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S002</text>
  <rect x="422" y="279" width="55" height="18" rx="3" fill="#DC2626" opacity="0.35"/>
  <text x="449" y="292" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">S003+NaN</text>
  <rect x="483" y="279" width="55" height="18" rx="3" fill="#DC2626" opacity="0.35"/>
  <text x="510" y="292" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#fff">NaN+S004</text>
  <text x="620" y="292" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#991B1B">All rows from both sides; NaN fills every gap</text>
  <text x="620" y="308" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Use when you cannot afford to lose any row</text>
  <rect x="726" y="281" width="50" height="18" rx="4" fill="#DC2626" opacity="0.15" stroke="#DC2626" stroke-width="1"/>
  <text x="751" y="294" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#991B1B">OUTER</text>
</svg>
