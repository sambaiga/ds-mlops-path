<svg width="800" height="360" viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7C3AED"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">@dataclass Eliminates Boilerplate</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Python generates __init__, __repr__, and __eq__ automatically from field declarations</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- LEFT PANEL: Plain class (gray/red tint) -->
  <rect x="10" y="58" width="355" height="290" rx="10"
        fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M20,58 L355,58 Q365,58 365,68 L365,95 L10,95 L10,68 Q10,58 20,58 Z"
        fill="#EF4444"/>
  <text x="187" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Plain Class</text>
  <text x="187" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#FECACA">all boilerplate written by hand</text>

  <rect x="22" y="103" width="331" height="233" rx="6" fill="#FFF5F5"/>
  <text x="36" y="120" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">class Student:</text>
  <text x="48" y="136" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">def __init__(self, name, score, grade):</text>
  <text x="60" y="150" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">    self.name  = name</text>
  <text x="60" y="164" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">    self.score = score</text>
  <text x="60" y="178" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">    self.grade = grade</text>
  <line x1="36" y1="186" x2="343" y2="186" stroke="#FECACA" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="48" y="200" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">def __repr__(self):</text>
  <text x="60" y="214" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">    return (f"Student(name={self.name!r},</text>
  <text x="60" y="228" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">             score={self.score!r},</text>
  <text x="60" y="242" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">             grade={self.grade!r})")</text>
  <line x1="36" y1="250" x2="343" y2="250" stroke="#FECACA" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="48" y="264" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">def __eq__(self, other):</text>
  <text x="60" y="278" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">    return (self.name == other.name and</text>
  <text x="60" y="292" font-family="'Jost',sans-serif" font-size="9.5" fill="#374151">            self.score == other.score ...)</text>
  <text x="187" y="326" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#DC2626" font-weight="600">~18 lines of repetitive code</text>

  <!-- ARROW -->
  <line x1="375" y1="203" x2="425" y2="203" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="365" y="188" width="70" height="22" rx="4" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1"/>
  <text x="400" y="202" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" font-weight="700" fill="#7C3AED">@dataclass</text>

  <!-- RIGHT PANEL: dataclass (green) -->
  <rect x="435" y="58" width="355" height="290" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M445,58 L780,58 Q790,58 790,68 L790,95 L435,95 L435,68 Q435,58 445,58 Z"
        fill="#059669"/>
  <text x="612" y="76" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">@dataclass</text>
  <text x="612" y="89" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#D1FAE5">Python generates the boilerplate</text>

  <rect x="447" y="103" width="331" height="120" rx="6" fill="#DCFCE7"/>
  <text x="461" y="120" font-family="'Jost',sans-serif" font-size="9.5" fill="#14532D">from dataclasses import dataclass</text>
  <line x1="461" y1="128" x2="768" y2="128" stroke="#86EFAC" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="461" y="144" font-family="'Jost',sans-serif" font-size="9.5" fill="#14532D">@dataclass</text>
  <text x="461" y="158" font-family="'Jost',sans-serif" font-size="9.5" fill="#14532D">class Student:</text>
  <text x="473" y="172" font-family="'Jost',sans-serif" font-size="9.5" fill="#14532D">name:  str</text>
  <text x="473" y="186" font-family="'Jost',sans-serif" font-size="9.5" fill="#14532D">score: float</text>
  <text x="473" y="200" font-family="'Jost',sans-serif" font-size="9.5" fill="#14532D">grade: str</text>
  <text x="612" y="218" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#059669" font-style="italic">4 lines -- same result</text>

  <!-- Auto-generated annotation box -->
  <rect x="447" y="235" width="331" height="80" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="612" y="253" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#059669">Auto-generated for you:</text>
  <text x="612" y="270" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">__init__(self, name, score, grade)</text>
  <text x="612" y="285" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">__repr__()  ·  __eq__()  ·  __hash__()</text>
  <text x="612" y="300" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">add frozen=True for immutability</text>

  <text x="612" y="337" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#059669" font-weight="600">Identical runtime behaviour -- less code</text>

</svg>
