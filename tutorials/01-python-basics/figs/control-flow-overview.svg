<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">Python Control Flow at a Glance</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Four constructs that direct which code runs and how many times</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- PANEL 1: if/elif/else (blue) -->
  <rect x="10" y="58" width="183" height="210" rx="10"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M20,58 L183,58 Q193,58 193,68 L193,98 L10,98 L10,68 Q10,58 20,58 Z"
        fill="#0369A1"/>
  <text x="101" y="78" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">if / elif / else</text>
  <text x="101" y="92" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#BFDBFE">Branching</text>

  <text x="101" y="118" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E3A5F">Branch on a condition.</text>
  <text x="101" y="133" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E3A5F">Only one branch runs.</text>

  <rect x="22" y="148" width="159" height="68" rx="6" fill="#DBEAFE"/>
  <text x="101" y="165" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#1E40AF">if score &gt;= 90:</text>
  <text x="101" y="179" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#1E40AF">    grade = "A"</text>
  <text x="101" y="193" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#1E40AF">elif score &gt;= 70:</text>
  <text x="101" y="207" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#1E40AF">    grade = "B"</text>

  <text x="101" y="240" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1" font-style="italic">runs once, at most</text>

  <!-- PANEL 2: for loop (green) -->
  <rect x="205" y="58" width="183" height="210" rx="10"
        fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M215,58 L378,58 Q388,58 388,68 L388,98 L205,98 L205,68 Q205,58 215,58 Z"
        fill="#059669"/>
  <text x="296" y="78" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">for item in iterable</text>
  <text x="296" y="92" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#D1FAE5">Definite iteration</text>

  <text x="296" y="118" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">Visit each element once.</text>
  <text x="296" y="133" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">Count is known upfront.</text>

  <rect x="217" y="148" width="159" height="68" rx="6" fill="#DCFCE7"/>
  <text x="296" y="165" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#14532D">for name in names:</text>
  <text x="296" y="179" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#14532D">    print(name)</text>
  <text x="296" y="200" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#14532D">for i, v in enumerate(</text>
  <text x="296" y="211" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#14532D">    vals): ...</text>

  <text x="296" y="240" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#059669" font-style="italic">N iterations guaranteed</text>

  <!-- PANEL 3: while loop (amber) -->
  <rect x="400" y="58" width="183" height="210" rx="10"
        fill="#FFFBEB" stroke="#B45309" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M410,58 L573,58 Q583,58 583,68 L583,98 L400,98 L400,68 Q400,58 410,58 Z"
        fill="#B45309"/>
  <text x="491" y="78" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">while condition</text>
  <text x="491" y="92" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#FDE68A">Indefinite iteration</text>

  <text x="491" y="118" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#78350F">Repeat until condition</text>
  <text x="491" y="133" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#78350F">evaluates to False.</text>

  <rect x="412" y="148" width="159" height="68" rx="6" fill="#FEF3C7"/>
  <text x="491" y="165" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#78350F">attempts = 0</text>
  <text x="491" y="179" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#78350F">while attempts &lt; 3:</text>
  <text x="491" y="193" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#78350F">    try_again()</text>
  <text x="491" y="207" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#78350F">    attempts += 1</text>

  <text x="491" y="240" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#B45309" font-style="italic">count not known upfront</text>

  <!-- PANEL 4: comprehension (purple) -->
  <rect x="595" y="58" width="195" height="210" rx="10"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <path d="M605,58 L780,58 Q790,58 790,68 L790,98 L595,98 L595,68 Q595,58 605,58 Z"
        fill="#7C3AED"/>
  <text x="692" y="75" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF">[x for x in seq</text>
  <text x="692" y="89" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#FFFFFF"> if cond]</text>

  <text x="692" y="116" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#3B0764">Build a list in one</text>
  <text x="692" y="130" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#3B0764">readable expression.</text>

  <rect x="607" y="148" width="171" height="68" rx="6" fill="#EDE9FE"/>
  <text x="692" y="165" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#3B0764">evens = [x for x in</text>
  <text x="692" y="179" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#3B0764">    range(10)</text>
  <text x="692" y="193" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="9" fill="#3B0764">    if x % 2 == 0]</text>
  <text x="692" y="210" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="8.5" fill="#6D28D9"># [0,2,4,6,8]</text>

  <text x="692" y="240" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#7C3AED" font-style="italic">also: dict, set, generator</text>

</svg>
