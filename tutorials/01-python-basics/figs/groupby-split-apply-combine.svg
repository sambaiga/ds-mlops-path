<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="sac-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="14" font-weight="700" fill="#1E293B">groupby: Split - Apply - Combine</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">Every groupby operation follows the same three-step pattern</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- STEP LABELS -->
  <text x="130" y="70" text-anchor="middle" font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#0369A1">1. Split</text>
  <text x="400" y="70" text-anchor="middle" font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#059669">2. Apply</text>
  <text x="670" y="70" text-anchor="middle" font-family="'Jost',sans-serif" font-size="12" font-weight="700" fill="#7C3AED">3. Combine</text>

  <!-- SPLIT: Original table on left -->
  <rect x="20" y="80" width="220" height="186" rx="10" fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#sac-shadow)"/>
  <!-- Header row -->
  <rect x="20" y="80" width="220" height="24" rx="10" fill="#0369A1"/>
  <text x="130" y="97" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#fff">Full DataFrame</text>
  <!-- Column headers -->
  <text x="75"  y="116" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">program</text>
  <text x="175" y="116" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">avg_marks</text>
  <line x1="30" y1="120" x2="230" y2="120" stroke="#DBEAFE" stroke-width="1"/>
  <!-- Data rows: group A (CS) -->
  <rect x="24" y="123" width="212" height="16" rx="2" fill="#DBEAFE" opacity="0.6"/>
  <text x="75"  y="135" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">CS</text>
  <text x="175" y="135" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">82.1</text>
  <rect x="24" y="141" width="212" height="16" rx="2" fill="#DBEAFE" opacity="0.6"/>
  <text x="75"  y="153" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">CS</text>
  <text x="175" y="153" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">77.4</text>
  <!-- Data rows: group B (DS) -->
  <rect x="24" y="159" width="212" height="16" rx="2" fill="#D1FAE5" opacity="0.7"/>
  <text x="75"  y="171" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">DS</text>
  <text x="175" y="171" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">91.0</text>
  <rect x="24" y="177" width="212" height="16" rx="2" fill="#D1FAE5" opacity="0.7"/>
  <text x="75"  y="189" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">DS</text>
  <text x="175" y="189" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">85.5</text>
  <!-- Data rows: group C (IT) -->
  <rect x="24" y="195" width="212" height="16" rx="2" fill="#EDE9FE" opacity="0.7"/>
  <text x="75"  y="207" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#3B0764">IT</text>
  <text x="175" y="207" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#3B0764">70.2</text>
  <rect x="24" y="213" width="212" height="16" rx="2" fill="#EDE9FE" opacity="0.7"/>
  <text x="75"  y="225" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#3B0764">IT</text>
  <text x="175" y="225" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#3B0764">73.8</text>
  <!-- Split label at bottom -->
  <text x="130" y="257" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1">.groupby("program")</text>

  <!-- ARROWS left to mid -->
  <line x1="248" y1="155" x2="282" y2="135" stroke="#0369A1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="248" y1="180" x2="282" y2="185" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="248" y1="210" x2="282" y2="235" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- APPLY: Three small group tables in the middle -->
  <!-- Group CS -->
  <rect x="286" y="80" width="128" height="70" rx="8" fill="#EFF6FF" stroke="#0369A1" stroke-width="1.5" filter="url(#sac-shadow)"/>
  <rect x="286" y="80" width="128" height="22" rx="8" fill="#0369A1"/>
  <text x="350" y="96" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#fff">Group: CS</text>
  <text x="320" y="116" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">82.1</text>
  <text x="320" y="132" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#1E3A5F">77.4</text>
  <text x="380" y="124" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#0369A1" font-weight="700">mean()</text>
  <text x="380" y="138" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#0369A1">= 79.75</text>

  <!-- Group DS -->
  <rect x="286" y="165" width="128" height="70" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.5" filter="url(#sac-shadow)"/>
  <rect x="286" y="165" width="128" height="22" rx="8" fill="#059669"/>
  <text x="350" y="181" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#fff">Group: DS</text>
  <text x="320" y="201" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">91.0</text>
  <text x="320" y="217" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#065F46">85.5</text>
  <text x="380" y="209" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#059669" font-weight="700">mean()</text>
  <text x="380" y="223" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#059669">= 88.25</text>

  <!-- Group IT -->
  <rect x="286" y="250" width="128" height="56" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#sac-shadow)"/>
  <rect x="286" y="250" width="128" height="22" rx="8" fill="#7C3AED"/>
  <text x="350" y="266" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9.5" font-weight="700" fill="#fff">Group: IT</text>
  <text x="320" y="286" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#3B0764">70.2 / 73.8</text>
  <text x="380" y="283" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="10" fill="#7C3AED" font-weight="700">= 72.0</text>

  <!-- Apply label -->
  <text x="350" y="316" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#059669">["avg_marks"].mean()</text>

  <!-- ARROWS mid to right -->
  <line x1="422" y1="115" x2="472" y2="148" stroke="#0369A1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="472,142 478,152 466,152" fill="#0369A1"/>
  <line x1="422" y1="200" x2="472" y2="175" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="472,168 478,178 466,178" fill="#059669"/>
  <line x1="422" y1="275" x2="472" y2="210" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="472,203 478,213 466,213" fill="#7C3AED"/>

  <!-- COMBINE: Result table on right -->
  <rect x="476" y="110" width="200" height="140" rx="10" fill="#FBF7FF" stroke="#7C3AED" stroke-width="1.5" filter="url(#sac-shadow)"/>
  <rect x="476" y="110" width="200" height="24" rx="10" fill="#7C3AED"/>
  <text x="576" y="127" text-anchor="middle" font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#fff">Result (Series)</text>
  <!-- Column headers -->
  <text x="545" y="148" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">program</text>
  <text x="645" y="148" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">avg_marks</text>
  <line x1="486" y1="152" x2="666" y2="152" stroke="#E9D5FF" stroke-width="1"/>
  <rect x="480" y="155" width="192" height="18" rx="2" fill="#DBEAFE" opacity="0.5"/>
  <text x="545" y="168" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E3A5F">CS</text>
  <text x="645" y="168" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#1E3A5F" font-weight="600">79.75</text>
  <rect x="480" y="175" width="192" height="18" rx="2" fill="#D1FAE5" opacity="0.6"/>
  <text x="545" y="188" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46">DS</text>
  <text x="645" y="188" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#065F46" font-weight="600">88.25</text>
  <rect x="480" y="195" width="192" height="18" rx="2" fill="#EDE9FE" opacity="0.6"/>
  <text x="545" y="208" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#3B0764">IT</text>
  <text x="645" y="208" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#3B0764" font-weight="600">72.00</text>
  <!-- Combine label -->
  <text x="576" y="240" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#7C3AED">one row per group</text>
  <text x="576" y="255" text-anchor="middle" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#7C3AED">index = group key</text>
</svg>
