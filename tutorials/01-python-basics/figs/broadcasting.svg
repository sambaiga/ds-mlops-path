<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
    </style>
    <filter id="panel-shadow" x="-4%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(30,41,59,0.09)"/>
    </filter>
    <marker id="arr-right" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#64748B"/>
    </marker>
  </defs>

  <!-- TITLE -->
  <text x="400" y="24" text-anchor="middle"
        font-family="'Jost','Segoe UI',system-ui,sans-serif"
        font-size="13" font-weight="700" fill="#1E293B">Broadcasting Rule: Shapes Are Compatible When Dimensions Match or One Is 1</text>
  <text x="400" y="41" text-anchor="middle"
        font-family="'Libre Franklin','Segoe UI',sans-serif"
        font-size="10.5" fill="#64748B">NumPy stretches the smaller array along size-1 axes -- no data is copied</text>
  <line x1="40" y1="48" x2="760" y2="48" stroke="#E2E8F0" stroke-width="1"/>

  <!-- MATRIX (5x3) label -->
  <text x="100" y="68" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#0369A1">matrix  (5, 3)</text>

  <!-- Draw 5x3 grid -->
  <!-- cols at x: 30, 62, 94, 126; rows at y: 75, 100, 125, 150, 175 -->
  <rect x="30" y="75" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="64" y="75" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="98" y="75" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="30" y="99" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="64" y="99" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="98" y="99" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="30" y="123" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="64" y="123" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="98" y="123" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="30" y="147" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="64" y="147" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="98" y="147" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="30" y="171" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="64" y="171" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>
  <rect x="98" y="171" width="32" height="22" rx="2" fill="#BFDBFE" stroke="#0369A1" stroke-width="1"/>

  <!-- Row/col dimension labels -->
  <text x="14" y="113" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1" transform="rotate(-90,14,113)">5 rows</text>
  <text x="80" y="207" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#0369A1">3 cols</text>

  <!-- PLUS sign -->
  <text x="175" y="138" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="28" font-weight="700" fill="#64748B">+</text>

  <!-- VECTOR (1x3) label -->
  <text x="300" y="68" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#059669">vector  (3,)</text>

  <!-- 1x3 vector row -->
  <rect x="234" y="75" width="42" height="22" rx="2" fill="#DCFCE7" stroke="#059669" stroke-width="1.5"/>
  <text x="255" y="90" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" fill="#14532D">v[0]</text>
  <rect x="278" y="75" width="42" height="22" rx="2" fill="#DCFCE7" stroke="#059669" stroke-width="1.5"/>
  <text x="299" y="90" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" fill="#14532D">v[1]</text>
  <rect x="322" y="75" width="42" height="22" rx="2" fill="#DCFCE7" stroke="#059669" stroke-width="1.5"/>
  <text x="343" y="90" text-anchor="middle" font-family="'Jost',sans-serif" font-size="9" fill="#14532D">v[2]</text>

  <!-- Stretch annotation -->
  <rect x="218" y="105" width="175" height="88" rx="6" fill="#F0FDF4" stroke="#059669" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- ghost rows showing stretch -->
  <rect x="234" y="111" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.5" stroke="#059669" stroke-width="0.5"/>
  <rect x="278" y="111" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.5" stroke="#059669" stroke-width="0.5"/>
  <rect x="322" y="111" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.5" stroke="#059669" stroke-width="0.5"/>
  <rect x="234" y="129" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.35" stroke="#059669" stroke-width="0.5"/>
  <rect x="278" y="129" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.35" stroke="#059669" stroke-width="0.5"/>
  <rect x="322" y="129" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.35" stroke="#059669" stroke-width="0.5"/>
  <rect x="234" y="147" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.2" stroke="#059669" stroke-width="0.5"/>
  <rect x="278" y="147" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.2" stroke="#059669" stroke-width="0.5"/>
  <rect x="322" y="147" width="42" height="16" rx="2" fill="#DCFCE7" opacity="0.2" stroke="#059669" stroke-width="0.5"/>
  <text x="300" y="183" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="8.5" fill="#059669" font-style="italic">stretches to 5 x 3</text>

  <!-- Arrow to result -->
  <line x1="395" y1="130" x2="435" y2="130" stroke="#64748B" stroke-width="2" marker-end="url(#arr-right)"/>

  <!-- RESULT (5x3) -->
  <text x="577" y="68" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="11" font-weight="600" fill="#7C3AED">result  (5, 3)</text>

  <!-- 5x3 result grid -->
  <rect x="440" y="75" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="474" y="75" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="508" y="75" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="440" y="99" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="474" y="99" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="508" y="99" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="440" y="123" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="474" y="123" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="508" y="123" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="440" y="147" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="474" y="147" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="508" y="147" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="440" y="171" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="474" y="171" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <rect x="508" y="171" width="32" height="22" rx="2" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>

  <!-- Result dimension labels -->
  <text x="484" y="208" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#7C3AED">3 cols</text>
  <text x="426" y="113" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#7C3AED" transform="rotate(-90,426,113)">5 rows</text>

  <!-- Rules box -->
  <rect x="560" y="72" width="228" height="128" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.5" filter="url(#panel-shadow)"/>
  <text x="674" y="91" text-anchor="middle"
        font-family="'Jost',sans-serif" font-size="10" font-weight="700" fill="#1E293B">Broadcasting Rules</text>
  <line x1="572" y1="97" x2="776" y2="97" stroke="#E2E8F0" stroke-width="1"/>
  <text x="574" y="113" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">1. Align shapes from the right</text>
  <text x="574" y="128" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">2. Dims must match OR one is 1</text>
  <text x="574" y="143" font-family="'Libre Franklin',sans-serif" font-size="9" fill="#374151">3. Size-1 dims stretch to match</text>
  <line x1="572" y1="151" x2="776" y2="151" stroke="#E2E8F0" stroke-width="1"/>
  <text x="574" y="165" font-family="'Jost',sans-serif" font-size="9" fill="#0369A1">(5, 3) + (3,)  -&gt;  (5, 3)</text>
  <text x="574" y="179" font-family="'Jost',sans-serif" font-size="9" fill="#059669">(3,) treated as (1, 3)</text>
  <text x="574" y="192" font-family="'Jost',sans-serif" font-size="9" fill="#7C3AED">broadcast to  (5, 3)</text>

  <!-- Bottom note -->
  <text x="400" y="230" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9.5" fill="#64748B">No loops, no copies -- NumPy handles shape alignment internally</text>
  <text x="400" y="246" text-anchor="middle"
        font-family="'Libre Franklin',sans-serif" font-size="9" fill="#64748B">Incompatible shapes raise ValueError at runtime</text>

</svg>
