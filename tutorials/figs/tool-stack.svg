<svg width="820" height="360" viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
      text { font-family: 'Jost', system-ui, sans-serif; }
    </style>
    <marker id="arr-down" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
      <path d="M1,1 L7,1 L4,7 Z" fill="#94A3B8"/>
    </marker>
    <marker id="arr-right" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M1,1 L1,7 L7,4 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- ── Column headers ──────────────────────────────────────────── -->
  <text x="215" y="16"
        font-size="10" font-weight="600" fill="#64748B"
        text-anchor="middle" letter-spacing="1">WHAT THIS BOOK COVERS</text>
  <text x="625" y="16"
        font-size="10" font-weight="600" fill="#94A3B8"
        text-anchor="middle" letter-spacing="1">ALSO CONNECTS TO</text>

  <!-- Vertical divider -->
  <line x1="442" y1="24" x2="442" y2="348"
        stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- ── LEFT COLUMN (x=30, width=390) ───────────────────────────── -->

  <!-- Layer 4 (top): Deploy and Monitor -->
  <rect x="30" y="28" width="390" height="64" rx="8"
        fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="52" y="50"
        font-size="12" font-weight="600" fill="#7C3AED">DEPLOY AND MONITOR</text>
  <text x="52" y="71"
        font-size="15" font-weight="700" fill="#3B0764">MLflow · FastAPI · Docker</text>

  <!-- Down arrow -->
  <line x1="125" y1="93" x2="125" y2="105"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Layer 3: Modelling -->
  <rect x="30" y="112" width="390" height="64" rx="8"
        fill="#FFF7ED" stroke="#D97706" stroke-width="2"/>
  <text x="52" y="134"
        font-size="12" font-weight="600" fill="#D97706">MODELLING</text>
  <text x="52" y="157"
        font-size="15" font-weight="700" fill="#92400E">scikit-learn · XGBoost · LightGBM</text>

  <!-- Down arrow -->
  <line x1="125" y1="177" x2="125" y2="189"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Layer 2: Data Tools -->
  <rect x="30" y="196" width="390" height="64" rx="8"
        fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
  <text x="52" y="218"
        font-size="12" font-weight="600" fill="#059669">DATA TOOLS</text>
  <text x="52" y="241"
        font-size="14" font-weight="700" fill="#065F46">NumPy · Pandas · Polars · Matplotlib</text>

  <!-- Down arrow -->
  <line x1="125" y1="261" x2="125" y2="273"
        stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Layer 1 (bottom): Foundation -->
  <rect x="30" y="280" width="390" height="60" rx="8"
        fill="#EFF6FF" stroke="#0369A1" stroke-width="2"/>
  <text x="52" y="302"
        font-size="12" font-weight="600" fill="#0369A1">FOUNDATION</text>
  <text x="52" y="325"
        font-size="15" font-weight="700" fill="#0C4A6E">Python · Chapters 1–8</text>

  <!-- ── RIGHT COLUMN (x=460, width=330) ─────────────────────────── -->
  <!-- Items are dashed to signal: related, but not the primary focus -->

  <!-- System design — aligned with Deploy/Monitor (y=28) -->
  <rect x="460" y="28" width="330" height="64" rx="8"
        fill="rgba(245,243,255,0.5)" stroke="#7C3AED" stroke-width="1.5"
        stroke-dasharray="6,3"/>
  <text x="480" y="50"
        font-size="12" font-weight="600" fill="#5B21B6">System design</text>
  <text x="480" y="67"
        font-size="11" fill="#7C3AED">How ML services fit into software architecture</text>
  <!-- Connector -->
  <line x1="422" y1="60" x2="458" y2="60"
        stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"
        marker-end="url(#arr-right)"/>

  <!-- Deep Learning — aligned with Modelling (y=112) -->
  <rect x="460" y="112" width="330" height="64" rx="8"
        fill="rgba(255,247,237,0.5)" stroke="#D97706" stroke-width="1.5"
        stroke-dasharray="6,3"/>
  <text x="480" y="134"
        font-size="12" font-weight="600" fill="#92400E">Deep Learning</text>
  <text x="480" y="151"
        font-size="11" fill="#B45309">PyTorch · TensorFlow</text>
  <text x="480" y="166"
        font-size="11" fill="#B45309">Introduced in this book; not the primary focus</text>
  <!-- Connector -->
  <line x1="422" y1="144" x2="458" y2="144"
        stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"
        marker-end="url(#arr-right)"/>

  <!-- Value-driven AI/ML — aligned with Data Tools (y=196) -->
  <rect x="460" y="196" width="330" height="64" rx="8"
        fill="rgba(240,253,244,0.5)" stroke="#059669" stroke-width="1.5"
        stroke-dasharray="6,3"/>
  <text x="480" y="218"
        font-size="12" font-weight="600" fill="#065F46">Value-driven AI/ML</text>
  <text x="480" y="235"
        font-size="11" fill="#059669">Business value, ethics, and stakeholder needs</text>
  <text x="480" y="250"
        font-size="11" fill="#059669">shape what gets built and why</text>
  <!-- Connector -->
  <line x1="422" y1="228" x2="458" y2="228"
        stroke="#94A3B8" stroke-width="1" stroke-dasharray="3,2"
        marker-end="url(#arr-right)"/>

</svg>
