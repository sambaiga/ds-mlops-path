<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&amp;display=swap');
      text { font-family: 'Jost', system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Layer 1: Python foundation -->
  <rect x="40" y="272" width="720" height="56" rx="8" fill="#EFF6FF" stroke="#0369A1" stroke-width="2"/>
  <text x="64" y="294" font-size="13" font-weight="600" fill="#0369A1">FOUNDATION</text>
  <text x="64" y="314" font-size="17" font-weight="700" fill="#0C4A6E">Python</text>
  <text x="420" y="300" font-size="13" fill="#1E40AF" text-anchor="start">The language every other layer is written in.</text>
  <text x="420" y="318" font-size="13" fill="#1E40AF" text-anchor="start">Chapters 1–8.</text>

  <!-- Arrow 1 to 2 -->
  <line x1="200" y1="268" x2="200" y2="258" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 2: Data tools -->
  <rect x="40" y="196" width="720" height="64" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
  <text x="64" y="218" font-size="13" font-weight="600" fill="#059669">DATA TOOLS</text>
  <text x="64" y="242" font-size="17" font-weight="700" fill="#065F46">NumPy · Pandas · Polars · Matplotlib</text>
  <text x="420" y="222" font-size="13" fill="#047857" text-anchor="start">Load, clean, transform, and visualise data.</text>
  <text x="420" y="240" font-size="13" fill="#047857" text-anchor="start">Chapters 6–16.</text>

  <!-- Arrow 2 to 3 -->
  <line x1="200" y1="192" x2="200" y2="182" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 3: Modelling -->
  <rect x="40" y="116" width="720" height="64" rx="8" fill="#FFF7ED" stroke="#D97706" stroke-width="2"/>
  <text x="64" y="138" font-size="13" font-weight="600" fill="#D97706">MODELLING</text>
  <text x="64" y="162" font-size="17" font-weight="700" fill="#92400E">scikit-learn · XGBoost · LightGBM</text>
  <text x="420" y="142" font-size="13" fill="#B45309" text-anchor="start">Train, evaluate, and tune models.</text>
  <text x="420" y="160" font-size="13" fill="#B45309" text-anchor="start">Chapters 17–21.</text>

  <!-- Arrow 3 to 4 -->
  <line x1="200" y1="112" x2="200" y2="102" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 4: Deploy -->
  <rect x="40" y="32" width="720" height="64" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="64" y="54" font-size="13" font-weight="600" fill="#7C3AED">DEPLOY AND MONITOR</text>
  <text x="64" y="78" font-size="17" font-weight="700" fill="#3B0764">MLflow · FastAPI · Docker</text>
  <text x="420" y="58" font-size="13" fill="#5B21B6" text-anchor="start">Ship models to production and keep them working.</text>
  <text x="420" y="76" font-size="13" fill="#5B21B6" text-anchor="start">Chapters 22+.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
